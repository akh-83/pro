<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Калькулятор успеваемости</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* БАЗОВЫЕ СТИЛИ */
    body { background-color: #1b222d; color: #e6edf3; font-family: "Inter", sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 40px; margin: 0; }
    
    /* СТИЛИ ВКЛАДОК ЯЗЫКОВ */
    .language-tabs { display: flex; gap: 4px; margin-bottom: -1px; z-index: 1; width: 94%; max-width: 400px; padding-left: 10px; box-sizing: border-box; }
    .lang-tab { 
      padding: 8px 16px; 
      background: #232a3b; 
      border: 1px solid #343e50; 
      border-bottom: none;
      border-radius: 8px 8px 0 0; 
      color: #8b949e; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 13px;
      transition: all 0.2s;
    }
    .lang-tab:hover { background: #2c354a; }
    .lang-tab.active { background: #4e73df; color: #fff; border-color: #4e73df; }

    /* КНОПКИ ПЕРЕКЛЮЧЕНИЯ СТРАНИЦ (НОРМА / ПРОЦЕНТЫ) */
    .page-tabs {
      display: flex;
      gap: 12px;
      width: 94%;
      max-width: 400px;
      margin-top: 12px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .page-btn {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      background: #232a3b;
      border-radius: 40px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
      color: #8b949e;
      border: 1px solid #343e50;
    }
    .page-btn.active {
      background: #4e73df;
      color: #fff;
      border-color: #4e73df;
    }

    /* КАЛЬКУЛЯТОР (общий контейнер) */
    .calculator { background-color: #232a3b; border-radius: 12px; padding: 30px; width: 94%; max-width: 400px; box-sizing: border-box; border: 1px solid #343e50; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); position: relative; z-index: 2; }
    .time-field { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0 18px; border: 1px solid #343e50; border-radius: 8px; background: transparent; color: #fff; font-size: 19px; cursor: pointer; text-align: left; }
    .label { color: #8b949e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ПОДГОТОВКА */
    .prep-card { border: 1px solid #343e50; border-radius: 8px; padding: 15px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .radio-circle { width: 20px; height: 20px; border: 2px solid #8b949e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .prep-card.active { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
    .prep-card.active .radio-circle { border-color: #58a6ff; }
    .radio-dot { width: 10px; height: 10px; background: #58a6ff; border-radius: 50%; display: none; }
    .prep-card.active .radio-dot { display: block; }

    /* КНОПКИ */
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: 600; color: #fff; cursor: pointer; font-size: 17px; }
    .btn-calc { background: #4e73df; }
    .btn-info { background: #343e50; border: 1px solid #454f63; }

    /* МОДАЛЬНЫЕ ОКНА */
    .picker-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); align-items: flex-start; padding-top: 20px; }
    .picker-container { background: #1b222d; width: 90%; max-width: 340px; border-radius: 20px; padding: 20px; border: 1px solid #343e50; }

    /* БАРАБАН */
    .picker-wheels { display: flex; justify-content: center; height: 200px; overflow: hidden; position: relative; gap: 5px; }
    .wheel { flex: 1; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
    .wheel div { height: 40px; line-height: 40px; font-size: 24px; color: #8b949e; scroll-snap-align: center; opacity: 0.2; }
    .wheel div.selected { color: #fff; opacity: 1; font-size: 29px; font-weight: bold; }
    .wheel div.spacer { height: 80px; }
    .picker-highlight { position: absolute; top: 80px; left: 0; width: 100%; height: 40px; background: rgba(255,255,255,0.07); border-radius: 8px; pointer-events: none; }

    /* ИСТОРИЯ (РЕЗУЛЬТАТЫ) */
    .history-card { background: #232a3b; border-radius: 12px; padding: 25px; margin-top: 25px; border: 1px solid #343e50; text-align: center; }
    .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto 20px; }
    .chart-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .chart-bg { fill: none; stroke: #343e50; stroke-width: 12; }
    .chart-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .chart-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; }
    .chart-percent { font-size: 46px; font-weight: bold; display: block; }
    .chart-label { font-size: 14px; color: #8b949e; text-transform: uppercase; margin-top: 5px; display: block; }

    /* УВЕДОМЛЕНИЯ */
    .status-alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 16px; font-weight: 500; text-align: left; border-left: 4px solid transparent; color: #ffffff !important; }
    .alert-red { background: rgba(240, 103, 103, 0.25); border-left-color: #f06767; }
    .alert-orange { background: rgba(255, 152, 0, 0.25); border-left-color: #ff9800; }
    .alert-green { background: rgba(60, 212, 160, 0.25); border-left-color: #3cd4a0; }

    .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; font-size: 14px; color: #8b949e; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    .stat-list { text-align: left; border-top: 1px solid #343e50; padding-top: 15px; }
    .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 16px; }
    .item-label { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* СТИЛИ ДЛЯ ВТОРОЙ СТРАНИЦЫ (ПРОЦЕНТЫ) */
    .input-row { display: flex; gap: 15px; margin-bottom: 25px; align-items: stretch; width: 100%; box-sizing: border-box; }
    .input-row .time-field { flex: 1; margin: 0; background: #161c24; font-size: 24px; font-weight: bold; outline: none; transition: border-color 0.2s; }
    .input-row .time-field:focus { border-color: #5882fa; }
    .btn-add { width: 90px; padding: 0; border: none; border-radius: 8px; background: #5882fa; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-add:hover { background: #476be0; }

    .tags-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
    .percent-tag { color: #fff; padding: 12px 5px; border-radius: 8px; font-size: 22px; font-weight: bold; text-align: center; cursor: pointer; user-select: none; transition: transform 0.1s, background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .percent-tag:active { transform: scale(0.95); }

    .instr-white { color: #ffffff !important; font-size: 17px !important; line-height: 1.5; }

    /* скрытие страниц */
    .page { display: none; }
    .page.active-page { display: block; }

    /* СТИЛИ ДЛЯ ШАПКИ И ПРОФИЛЯ */
    .top-header { display: flex; justify-content: space-between; align-items: center; width: 94%; max-width: 400px; margin-bottom: 15px; }
    .users-badge { background: rgba(88, 166, 255, 0.1); color: #58a6ff; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; border: 1px solid rgba(88, 166, 255, 0.3); }
    .profile-btn { background: #232a3b; color: #e6edf3; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid #343e50; transition: 0.2s; }
    .profile-btn:hover { background: #2c354a; }
    .history-empty { text-align: center; color: #8b949e; margin-top: 20px; font-size: 15px; }
    .history-item { background: #1b222d; border: 1px solid #343e50; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; color: #fff; }
    .history-item b { color: #3cd4a0; }
  </style>
</head>
<body>

  <div class="top-header">
    <div class="users-badge" id="globalUserCount">users: ...</div>
    <div class="profile-btn" onclick="openProfile()">Профиль</div>
  </div>

  <div class="language-tabs">
    <div class="lang-tab" data-lang="Eng">Eng</div>
    <div class="lang-tab" data-lang="Pol">Pol</div>
    <div class="lang-tab" data-lang="Esp">Esp</div>
    <div class="lang-tab" data-lang="Ukr">Ukr</div>
    <div class="lang-tab active" data-lang="Pyc">Pyc</div>
  </div>

  <div class="page-tabs">
    <div class="page-btn active" data-page="norm" id="tab_norm">Норма</div>
    <div class="page-btn" data-page="percent" id="tab_percent">Проценты</div>
  </div>

  <div id="normPage" class="calculator page active-page">
    <label class="label" id="l_qty">Количество штук</label>
    <input type="number" id="quantity" class="time-field" placeholder="0">

    <label class="label" id="l_tpi">Время на 1 штуку</label>
    <div id="timePerItem" class="time-field" onclick="openPicker('timePerItem')">00:00:30</div>

    <div class="prep-card" id="prepToggle" onclick="togglePrep()">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="radio-circle"><div class="radio-dot" id="radioDot" style="display:none;"></div></div>
        <span><b style="font-size: 19px;" id="l_prep">Подготовка</b><br><small style="color:#8b949e; font-size:14px;" id="l_prepSub">15 минут к норме</small></span>
      </div>
      <div id="statusLabel" class="status-text" style="font-size:14px; color:#8b949e; font-weight:bold;">НЕ АКТИВНО</div>
    </div>

    <label class="label" id="l_start">Начало</label>
    <div id="startTime" class="time-field" onclick="openPicker('startTime', true)">08:00</div>

    <label class="label" id="l_end">Окончание</label>
    <div id="endTime" class="time-field" onclick="openPicker('endTime')">00:00:00</div>

    <div class="btn-group">
      <button class="btn btn-calc" id="b_calc" onclick="calculate()">Рассчитать</button>
      <button class="btn btn-info" id="b_info" onclick="openModal('infoOverlayNorm')">Инструкция</button>
    </div>
    <div id="result"></div>
  </div>

  <div id="percentPage" class="calculator page">
    <label class="label" id="l_enter_percent">Введите процент</label>
    <div class="input-row">
      <input type="number" id="percentInput" class="time-field" placeholder="0" min="0" max="100">
      <button class="btn-add" onclick="addPercent()">+ %</button>
    </div>

    <div id="tagsContainer" class="tags-grid"></div>

    <div class="btn-group">
      <button class="btn btn-calc" id="b_calc_percent" onclick="calculateAverage()">Рассчитать</button>
      <button class="btn btn-info" id="b_info_percent" onclick="openModal('infoOverlayProc')">Инструкция</button>
    </div>
    <div id="resultPercent"></div>
  </div>

  <div id="infoOverlayNorm" class="picker-overlay">
    <div class="picker-container" style="width:90%; max-width:360px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#1b222d; padding-bottom:10px; z-index:10;">
        <b style="font-size:22px; color:#fff;" id="i_title_norm">Инструкция</b>
        <span onclick="closeModal('infoOverlayNorm')" style="color:#58a6ff; cursor:pointer; font-weight:bold; font-size:17px;">X</span>
      </div>
      <div id="instructionContentNorm"></div>
    </div>
  </div>

  <div id="infoOverlayProc" class="picker-overlay">
    <div class="picker-container" style="width:90%; max-width:360px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#1b222d; padding-bottom:10px; z-index:10;">
        <b style="font-size:22px; color:#fff;" id="i_title_proc">Инструкция</b>
        <span onclick="closeModal('infoOverlayProc')" style="color:#58a6ff; cursor:pointer; font-weight:bold; font-size:17px;">X</span>
      </div>
      <div id="instructionContentProc"></div>
    </div>
  </div>

  <div id="pickerOverlay" class="picker-overlay">
    <div class="picker-container">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#fff; font-size:17px;">
        <span onclick="closePicker()" id="p_cancel" style="color:#58a6ff; cursor:pointer;">Отмена</span>
        <b id="p_title">Время</b>
        <span onclick="confirmPicker()" id="p_done" style="color:#58a6ff; cursor:pointer;">Готово</span>
      </div>
      <div class="picker-wheels">
        <div class="picker-highlight"></div>
        <div class="wheel" id="hWheel"></div><div class="wheel" id="mWheel"></div><div class="wheel" id="sWheel"></div>
      </div>
    </div>
  </div>

  <div id="profileOverlay" class="picker-overlay">
    <div class="picker-container" style="width:90%; max-width:360px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#1b222d; padding-bottom:10px; z-index:10;">
        <b style="font-size:22px; color:#fff;" id="profileName">Пользователь</b>
        <span onclick="closeModal('profileOverlay')" style="color:#58a6ff; cursor:pointer; font-weight:bold; font-size:17px;">X</span>
      </div>
      <div style="color:#8b949e; font-size:12px; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px;">Ваша история сохранений</div>
      <div id="profileHistoryContent">
        <div class="history-empty">Истории нет</div>
      </div>
    </div>
  </div>

  <script>
    // -------------------------- TELEGRAM SDK --------------------------
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Инициализация данных пользователя
    const user = tg.initDataUnsafe?.user || { id: 0, first_name: "Пользователь" };
    document.getElementById('profileName').textContent = user.first_name;

    // -------------------------- ОБЩИЙ ПЕРЕВОД --------------------------

        btns: { calc:'Рассчитать', info:'Инструкция', cancel:'Отмена', done:'Готово', close:'Закрыть', pick:'Время' },
        stats: { success:'Успеваемость', zone:'Вы сейчас находитесь в зоне:', plan:'План окончания:', norm:'Норма на всё:', spent1:'Затрачено на 1 шт:', spentNorm:'Время затрачено:', fact:'Факт. окончание:', qtyPerHour:'Кол. в час:', forThisTime:'За это время:' },
        legend: ['Риск', 'Не плохо', 'Норма'],
        zones: { risk: 'Красная зона риска', orange: 'Оранжевая зона', green: 'Зелёная зона', over: 'Красная зона' },
        msgs: { fail: 'ВЫ НЕ СПРАВЛЯЕТЕСЬ!', push: 'ПОДНАЖМИТЕ!', good: 'Хороший темп ТАК ДЕРЖАТЬ!', over: 'ВЫ ПРЕВЫШАЕТЕ НОРМУ!' },
        instrNorm: [
          {t: 'Как пользоваться', c: '1. Впишите количество штук.<br>2. Время с чертежа.<br>3. Активируйте "Подготовку".<br>4. Укажите время начала/конца.'},
          {t: 'Как понимать цвета?', c: 'Цвет круга меняется: Красный — Вы не справляетесь с нормой, Оранжевый — Не плохо но лучше увеличить темп, Зеленый — Вы справляетесь с нормой. Если попали в красную зону, нужно исправить темп.'},
          {t: 'Процентное соотношение зон', c: 'Ниже 65%: Красная зона (Риск).<br>65-75%: Оранжевый (не плохо но лучше поднажать).<br>75-100%: Зеленый (Норма).<br>Выше 100%: Красный (Перебор).'}
        ],
        labelsPercent: { enterPercent:'Введите процент' },
        statsPercent: { success:'УСПЕВАЕМОСТЬ', zone:'Вы сейчас находитесь в зоне:' },
        legendPercent: ['Риск', 'Не плохо', 'Норма'],
        zonesPercent: { risk: 'Красная зона риска', orange: 'Оранжевая зона', green: 'Зелёная зона' },
        msgsPercent: { fail: 'ВЫ НЕ СПРАВЛЯЕТЕСЬ!', push: 'ПОДНАЖМИТЕ!', good: 'Хороший темп ТАК ДЕРЖАТЬ!' },
        instrProc: [
          {t: 'Как пользоваться', c: '1. Впишите процент успеваемости по одному чертежу.<br>2. Нажмите "+ %", чтобы добавить его в список.<br>3. Добавьте все проценты за день.<br>4. Нажмите "Рассчитать", чтобы узнать среднюю успеваемость.<br><br><span style="color:#8b949e"><i>* Чтобы удалить ошибочно добавленный процент, просто нажмите на его тег.</i></span>'},
          {t: 'Как понимать цвета?', c: 'Цвет круга меняется:<br><br><b style="color:#f06767">Красный</b> — Вы не справляетесь с нормой (ниже 65%).<br><b style="color:#ff9800">Оранжевый</b> — Не плохо, но лучше увеличить темп (65-74%).<br><b style="color:#3cd4a0">Зеленый</b> — Отличный темп, вы справляетесь с нормой (75% и выше).'}
        ]
      },
      'Eng': {
        tabs: { norm: 'Norm', percent: 'Percentages' },
        labels: { qty:'Quantity', tpi:'Time per item', prep:'Preparation', prepSub:'15 min to norm', start:'Start', end:'End', active:'ACTIVE', inactive:'INACTIVE' },
        btns: { calc:'Calculate', info:'Instruction', cancel:'Cancel', done:'Done', close:'Close', pick:'Time' },
        stats: { success:'Efficiency', zone:'You are currently in zone:', plan:'Planned end:', norm:'Total norm:', spent1:'Spent per item:', spentNorm:'Time spent:', fact:'Fact. end:', qtyPerHour:'Qty per hour:', forThisTime:'In this time:' },
        legend: ['Risk', 'Not bad', 'Normal'],
        zones: { risk: 'Red Risk Zone', orange: 'Orange Zone', green: 'Green Zone', over: 'Red Zone' },
        msgs: { fail: 'YOU ARE FAILING!', push: 'PUSH HARDER!', good: 'Good pace KEEP IT UP!', over: 'YOU ARE OVER THE LIMIT!' },
        instrNorm: [
          {t: 'How to use', c: '1. Enter quantity.<br>2. Time from drawing.<br>3. Activate "Preparation".<br>4. Set start/end time.'},

        labelsPercent: { enterPercent:'Enter percentage' },

        legendPercent: ['Risk', 'Not bad', 'Normal'],

        msgsPercent: { fail: 'YOU ARE FAILING!', push: 'PUSH HARDER!', good: 'Good pace KEEP IT UP!' },
        instrProc: [

          {t: 'Colors meaning', c: '<b style="color:#f06767">Red</b> — You are failing (<65%).<br><b style="color:#ff9800">Orange</b> — Not bad but speed up (65-74%).<br><b style="color:#3cd4a0">Green</b> — You are doing well (≥75%).'}

        btns: { calc:'Oblicz', info:'Instrukcja', cancel:'Anuluj', done:'Gotowe', close:'Zamknij', pick:'Czas' },
        stats: { success:'Wydajność', zone:'Jesteś teraz в strefie:', plan:'Planowany koniec:', norm:'Norma całkowita:', spent1:'Czas na 1 szt:', spentNorm:'Czas zużyty:', fact:'Fakt. koniec:', qtyPerHour:'Ilość na godz:', forThisTime:'W tym czasie:' },
        legend: ['Ryzyko', 'Nieźle', 'Norma'],
        zones: { risk: 'Czerwona strefa ryzyka', orange: 'Pomarańczowa strefa', green: 'Zielona strefa', over: 'Czerwona strefa' },
        msgs: { fail: 'NIE DAJESZ RADY!', push: 'PRZYCIŚNIJ!', good: 'Dobre tempo TAK TRZYMAĆ!', over: 'PRZEKRACZASZ NORMĘ!' },
        instrNorm: [
          {t: 'Jak używać', c: '1. Wpisz ilość.<br>2. Czas z rysunku.<br>3. Aktywuj "Przygotowanie".<br>4. Ustaw czas startu/końca.'},

        stats: { success:'Eficiencia', zone:'Estás в la zona:', plan:'Fin previsto:', norm:'Norma total:', spent1:'Gasto por 1 pza:', spentNorm:'Tiempo gastado:', fact:'Fin real:', qtyPerHour:'Cant. por hora:', forThisTime:'En este tiempo:' },
        legend: ['Riesgo', 'Regular', 'Normal'],

        msgs: { fail: '¡NO ESTÁS CUMPLIENDO!', push: '¡APRIETA EL PASO!', good: 'Buen ritmo ¡SIGUE ASÍ!', over: '¡EXCEDES LA NORMA!' },
        instrNorm: [

        ],
        labelsPercent: { enterPercent:'Introducir porcentaje' },
        statsPercent: { success:'EFICIENCIA', zone:'Estás в la zona:' },
        legendPercent: ['Riesgo', 'Regular', 'Normal'],
        zonesPercent: { risk: 'Zona Roja de Riesgo', orange: 'Zona Naranja', green: 'Zona Verde' },
        msgsPercent: { fail: '¡NO ESTÁS CUMPLIENDO!', push: '¡APRIETA EL PASO!', good: 'Buen ritmo ¡SIGUE ASÍ!' },
        instrProc: [
          {t: 'Cómo usar', c: '1. Ingrese porcentaje.<br>2. Presione "+ %".<br>3. Añada todos los porcentajes.<br>4. Presione Calcular.<br><br><span style="color:#8b949e"><i>* Toque una etiqueta para eliminarla.</i></span>'},
          {t: 'Significado de colores', c: '<b style="color:#f06767">Rojo</b> — No cumples (<65%).<br><b style="color:#ff9800">Naranja</b> — Acelera (65-74%).<br><b style="color:#3cd4a0">Green</b> — Vas bien (≥75%).'}
        ]
      },
      'Ukr': {
        tabs: { norm: 'Норма', percent: 'Відсотки' },
        labels: { qty:'Кількість штук', tpi:'Час на 1 штуку', prep:'Підготовка', prepSub:'15 хвилин до норми', start:'Початок', end:'Закінчення', active:'АКТИВНО', inactive:'НЕ АКТИВНО' },
        btns: { calc:'Розрахувати', info:'Інструкція', cancel:'Відміна', done:'Готово', close:'Закрити', pick:'Час' },
        stats: { success:'Успішність', zone:'Ви зараз в зоні:', plan:'План закінчення:', norm:'Норма на все:', spent1:'Витрачено на 1 шт:', spentNorm:'Час витрачено:', fact:'Факт. закінчення:', qtyPerHour:'Кільк. на год:', forThisTime:'За цей час:' },
        legend: ['Ризик', 'Не погано', 'Норма'],
        zones: { risk: 'Червона зона ризику', orange: 'Помаранчева зона', green: 'Зелена зона', over: 'Червона зона' },
        msgs: { fail: 'ВИ НЕ СПРАВЛЯЄТЕСЬ!', push: 'ПІДНАТИСНІТЬ!', good: 'Хороший темп ТАК ТРИМАТИ!', over: 'ВИ ПЕРЕВИЩУЄТЕ НОРМУ!' },
        instrNorm: [
          {t: 'Як користуватися', c: '1. Впишіть кількість штук.<br>2. Час з креслення.<br>3. Активуйте "Підготовку".<br>4. Вкажіть час.'},
          {t: 'Як розуміти кольори?', c: 'Червоний — не справляєтесь, Помаранчевий — треба прискоритись, Зелений — ви в нормі.'},
          {t: 'Відсоткове співвідношення зон', c: 'Ниже 65%: Червона (Ризик).<br>65-75%: Помаранчева (Прискоритись).<br>75-100%: Зелена (Норма).<br>Вище 100%: Червона (Перебір).'}
        ],
        labelsPercent: { enterPercent:'Введіть відсоток' },
        statsPercent: { success:'УСПІШНІСТЬ', zone:'Ви зараз в зоні:' },
        legendPercent: ['Ризик', 'Не погано', 'Норма'],
        zonesPercent: { risk: 'Червона зона ризику', orange: 'Помаранчева зона', green: 'Зелена зона' },
        msgsPercent: { fail: 'ВИ НЕ СПРАВЛЯЄТЕСЬ!', push: 'ПІДНАТИСНІТЬ!', good: 'Хороший темп ТАК ТРИМАТИ!' },
        instrProc: [
          {t: 'Як користуватися', c: '1. Введіть відсоток.<br>2. Натисніть "+ %".<br>3. Додайте всі відсотки.<br>4. Натисніть Розрахувати.<br><br><span style="color:#8b949e"><i>* Натисніть на тег, щоб видалити його.</i></span>'},
          {t: 'Як розуміти кольори?', c: '<b style="color:#f06767">Червоний</b> — не справляєтесь (<65%).<br><b style="color:#ff9800">Помаранчевий</b> — треба прискоритись (65-74%).<br><b style="color:#3cd4a0">Зелений</b> — ви в нормі (≥75%).'}
        ]
      }
    };

    let currentLang = 'Pyc';
    let percentList = [];
    let savedHistory = [];

    // -------------------------- STORAGE LOGIC --------------------------
    
    // Загрузка истории и счетчика при старте
    function initAppData() {
        // Загружаем личную историю пользователя из CloudStorage
        tg.CloudStorage.getItem('kkn_history', (err, value) => {
            if (!err && value) {
                savedHistory = JSON.parse(value);
            }
        });

        // Получаем счетчик пользователей через API Telegram бота
        // (Для CloudStorage это имитация на основе уникальных входов, 
        // так как CloudStorage не дает списка всех юзеров без Backend)
        updateUserBadge();
    }

    function saveRecordToCloud(record) {
        savedHistory.unshift(record); // Добавляем в начало
        if (savedHistory.length > 20) savedHistory.pop(); // Храним только последние 20

        tg.CloudStorage.setItem('kkn_history', JSON.stringify(savedHistory));
    }

    function updateUserBadge() {
        // В реальном сценарии без бэкенда мы можем только имитировать рост или 
        // использовать статистику бота. Здесь выведем статичное красивое число или 
        // привяжем к "регистрации" в CloudStorage.
        document.getElementById('globalUserCount').textContent = `users: 48`; 
    }

    function openProfile() {
        const historyContainer = document.getElementById('profileHistoryContent');
        if (savedHistory.length === 0) {
            historyContainer.innerHTML = '<div class="history-empty">Истории нет</div>';
        } else {
            historyContainer.innerHTML = savedHistory.map(item => `
                <div class="history-item">
                    <div style="font-size:11px; color:#8b949e; margin-bottom:5px;">${item.date}</div>
                    Тип: ${item.type === 'norm' ? 'Норма' : 'Проценты'}<br>
                    Результат: <b>${item.result}%</b>
                </div>
            `).join('');
        }
        openModal('profileOverlay');
    }

    // -------------------------- UI LOGIC --------------------------

    // Переключение страниц
    document.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = btn.getAttribute('data-page');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(page + 'Page').classList.add('active-page');
        document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Переключение языков
    document.querySelectorAll('.lang-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        setLang(tab.getAttribute('data-lang'));
      });
    });

    function setLang(lang) {
      currentLang = lang;
      const t = tr[lang] || tr['Pyc'];
      
      document.querySelectorAll('.lang-tab').forEach(el => {
        const isActive = el.getAttribute('data-lang') === lang;
        if (isActive) el.classList.add('active');
        else el.classList.remove('active');
      });

      document.getElementById('tab_norm').textContent = t.tabs.norm;
      document.getElementById('tab_percent').textContent = t.tabs.percent;

      document.getElementById('l_qty').textContent = t.labels.qty;
      document.getElementById('l_tpi').textContent = t.labels.tpi;
      document.getElementById('l_prep').textContent = t.labels.prep;
      document.getElementById('l_prepSub').textContent = t.labels.prepSub;
      document.getElementById('l_start').textContent = t.labels.start;
      document.getElementById('l_end').textContent = t.labels.end;
      document.getElementById('b_calc').textContent = t.btns.calc;
      document.getElementById('b_info').textContent = t.btns.info;
      document.getElementById('p_cancel').textContent = t.btns.cancel;
      document.getElementById('p_done').textContent = t.btns.done;
      document.getElementById('p_title').textContent = t.btns.pick;
      document.getElementById('i_title_norm').textContent = t.btns.info;
      updatePrepStatus();

      let htmlNorm = '';
      t.instrNorm.forEach(item => {
        htmlNorm += `<div style="background:#232a3b; border-radius:8px; margin-bottom:8px; border:1px solid #343e50;"><div style="padding:16px; display:flex; justify-content:space-between; cursor:pointer; color:#58a6ff; font-size:17px;" onclick="toggleAccordion(this)">${item.t} <span>▼</span></div><div class="instr-white" style="padding:0 16px 16px; display:none;">${item.c}</div></div>`;
      });
      document.getElementById('instructionContentNorm').innerHTML = htmlNorm;

      document.getElementById('l_enter_percent').textContent = t.labelsPercent.enterPercent;
      document.getElementById('b_calc_percent').textContent = t.btns.calc;
      document.getElementById('b_info_percent').textContent = t.btns.info;
      document.getElementById('i_title_proc').textContent = t.btns.info;
      let htmlProc = '';
      t.instrProc.forEach(item => {
        htmlProc += `<div style="background:#232a3b; border-radius:8px; margin-bottom:8px; border:1px solid #343e50;"><div style="padding:16px; display:flex; justify-content:space-between; cursor:pointer; color:#58a6ff; font-size:17px;" onclick="toggleAccordion(this)">${item.t} <span>▼</span></div><div class="instr-white" style="padding:0 16px 16px; display:none;">${item.c}</div></div>`;
      });
      document.getElementById('instructionContentProc').innerHTML = htmlProc;

      if(document.getElementById('result').innerHTML !== "") calculate();
      if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage();
    }

    let isPrepActive = false, activeField = null, shortFormat = false;
    function initWheel(id, max) {
      const w = document.getElementById(id); w.innerHTML = '<div class="spacer"></div>';
      for (let i=0; i<=max; i++) { let d = document.createElement('div'); d.textContent = String(i).padStart(2,'0'); w.appendChild(d); }
      w.innerHTML += '<div class="spacer"></div>';
      w.onscroll = () => { let idx = Math.round(w.scrollTop/40); w.querySelectorAll('div:not(.spacer)').forEach((item, i) => item.classList.toggle('selected', i === idx)); };
    }
    initWheel('hWheel', 23); initWheel('mWheel', 59); initWheel('sWheel', 59);
    function openPicker(id, isShort=false) { activeField = id; shortFormat = isShort; document.getElementById('sWheel').style.display = isShort ? 'none' : 'block'; document.getElementById('pickerOverlay').style.display = 'flex'; }
    function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }
    function confirmPicker() {
      const h = document.querySelector('#hWheel .selected')?.textContent || "00", m = document.querySelector('#mWheel .selected')?.textContent || "00", s = document.querySelector('#sWheel .selected')?.textContent || "00";
      document.getElementById(activeField).textContent = shortFormat ? `${h}:${m}` : `${h}:${m}:${s}`; closePicker();
    }
    function togglePrep() { isPrepActive = !isPrepActive; updatePrepStatus(); }
    function updatePrepStatus() {
      const t = tr[currentLang];
      document.getElementById('radioDot').style.display = isPrepActive ? 'block' : 'none';
      document.getElementById('prepToggle').classList.toggle('active', isPrepActive);
      document.getElementById('statusLabel').textContent = isPrepActive ? t.labels.active : t.labels.inactive;
      document.getElementById('statusLabel').style.color = isPrepActive ? '#3cd4a0' : '#8b949e';
    }
    function parseToSec(str) { let p = str.split(':').map(Number); return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*3600 + p[1]*60; }
    function formatTime(s) { let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.round(s%60); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
    
    function calculate() {
      const q = parseFloat(document.getElementById('quantity').value) || 0; if (!q) return;
      const t = tr[currentLang];
      const tpi = parseToSec(document.getElementById('timePerItem').textContent), prep = isPrepActive ? 900 : 0, norm = (q * tpi) + prep;
      const start = parseToSec(document.getElementById('startTime').textContent), plan = formatTime((start + norm) % 86400), endStr = document.getElementById('endTime').textContent;
      let eff = 0, spent = "--:--:--", spentPer = "--:--:--", neededQty = 0;
      if (endStr !== "00:00:00") { 
        let FactS = parseToSec(endStr), FactT = FactS >= start ? FactS - start : (86400 - start) + FactS; 
        eff = Math.round((norm / FactT) * 100); 
        spent = formatTime(FactT); 
        spentPer = formatTime((FactT - prep) / q); 
        neededQty = tpi > 0 ? Math.floor(Math.max(0, FactT - prep) / tpi) : 0;
        
        // Сохраняем в историю
        saveRecordToCloud({
            date: new Date().toLocaleString(),
            type: 'norm',
            result: eff
        });
      }
      let qph = tpi > 0 ? 3600 / tpi : 0, maxQph = Math.floor(qph);
      let clr = "#8b949e", zn = "---", msg = "", alrt = "";
      if (eff > 0) {
        if (eff < 65) { clr="#f06767"; zn=t.zones.risk; msg=t.msgs.fail; alrt="alert-red"; }
        else if (eff < 75) { clr="#ff9800"; zn=t.zones.orange; msg=t.msgs.push; alrt="alert-orange"; }
        else if (eff <= 100) { clr="#3cd4a0"; zn=t.zones.green; msg=t.msgs.good; alrt="alert-green"; }
        else { clr="#f06767"; zn=t.zones.over; msg=t.msgs.over; alrt="alert-red"; }
      }
      const off = 440 - (440 * Math.min(eff, 100)) / 100;
      document.getElementById('result').innerHTML = `<div class="history-card"><div class="chart-container"><svg class="chart-svg" viewBox="0 0 160 160"><circle class="chart-bg" cx="80" cy="80" r="70" /><circle class="chart-fill" cx="80" cy="80" r="70" style="stroke:${clr}; stroke-dasharray:440; stroke-dashoffset:${off};" /></svg><div class="chart-text"><span class="chart-percent" style="color:${clr}">${eff}%</span><span class="chart-label">${t.stats.success}</span></div></div><div class="status-alert ${alrt}">${t.stats.zone} <b>${zn}</b><br>${msg}</div><div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#f06767"></div>${t.legend[0]}</div><div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>${t.legend[1]}</div><div class="legend-item"><div class="legend-dot" style="background:#3cd4a0"></div>${t.legend[2]}</div></div><div class="stat-list"><div class="stat-item"><div class="item-label"><div class="dot" style="background:#3cd4a0"></div>${t.stats.plan}</div><b>${plan}</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#f06767"></div>${t.stats.norm}</div><b>${formatTime(norm)}</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#9c27b0"></div>${t.stats.qtyPerHour}</div><b>${maxQph} шт.</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#ffeb3b"></div>${t.stats.forThisTime}</div><b>${neededQty} шт.</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#00bcd4"></div>${t.stats.spent1}</div><b>${spentPer}</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#4e73df"></div>${t.stats.spentNorm}</div><b>${spent}</b></div><div class="stat-item"><div class="item-label"><div class="dot" style="background:#ff9800"></div>${t.stats.fact}</div><b>${endStr}</b></div></div></div>`;
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function getColorForPercent(p) {
      if (p < 65) return "#f06767";
      if (p < 75) return "#ff9800";
      return "#3cd4a0";
    }
    function addPercent() {
      const input = document.getElementById('percentInput');
      const val = parseInt(input.value);
      if (!isNaN(val) && val >= 0 && val <= 100) {
        percentList.push(val);
        input.value = '';
        renderTags();
        if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage();
      }
      input.focus();
    }
    function renderTags() {
      const container = document.getElementById('tagsContainer');
      container.innerHTML = '';
      percentList.forEach((p, idx) => {
        let tag = document.createElement('div');
        tag.className = 'percent-tag';
        tag.style.background = getColorForPercent(p);
        tag.textContent = p + ' %';
        tag.onclick = () => { percentList.splice(idx, 1); renderTags(); if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage(); };
        container.appendChild(tag);
      });
    }
    function calculateAverage() {
      const resultDiv = document.getElementById('resultPercent');
      if (percentList.length === 0) { resultDiv.innerHTML = ''; return; }
      const t = tr[currentLang];
      let sum = percentList.reduce((a, b) => a + b, 0);
      let eff = Math.round(sum / percentList.length);
      
      // Сохраняем в историю
      saveRecordToCloud({
          date: new Date().toLocaleString(),
          type: 'percent',
          result: eff
      });

      let clr = "#8b949e", zn = "---", msg = "", alrt = "";
      if (eff < 65) { clr="#f06767"; zn=t.zonesPercent.risk; msg=t.msgsPercent.fail; alrt="alert-red"; }
      else if (eff < 75) { clr="#ff9800"; zn=t.zonesPercent.orange; msg=t.msgsPercent.push; alrt="alert-orange"; }
      else { clr="#3cd4a0"; zn=t.zonesPercent.green; msg=t.msgsPercent.good; alrt="alert-green"; }
      const off = 440 - (440 * eff) / 100;
      resultDiv.innerHTML = `
        <div class="history-card">
          <div class="chart-container">
            <svg class="chart-svg" viewBox="0 0 160 160"><circle class="chart-bg" cx="80" cy="80" r="70" /><circle class="chart-fill" cx="80" cy="80" r="70" style="stroke:${clr}; stroke-dasharray:440; stroke-dashoffset:${off};" /></svg>
            <div class="chart-text"><span class="chart-percent" style="color:${clr}">${eff}%</span><span class="chart-label">${t.statsPercent.success}</span></div>
          </div>
          <div class="status-alert ${alrt}">${t.statsPercent.zone}<br><b style="font-size: 19px; display:block; margin: 4px 0;">${zn}</b>${msg}</div>
          <div class="legend"><div class="legend-item"><div class="legend-dot" style="background:#f06767"></div>${t.legendPercent[0]}</div><div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>${t.legendPercent[1]}</div><div class="legend-item"><div class="legend-dot" style="background:#3cd4a0"></div>${t.legendPercent[2]}</div></div>
        </div>`;
    }

    function openModal(modalId) { document.getElementById(modalId).style.display = 'flex'; }
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    function toggleAccordion(el) { let c = el.nextElementSibling; c.style.display = (c.style.display === 'none' ? 'block' : 'none'); }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('percentInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); addPercent(); }
      });
      setLang('Pyc');
      initAppData();
    });
  </script>
</body>
</html>
