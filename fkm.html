<!DOCTYPE html>

  <title>Калькулятор успеваемости</title>

  <script>

  <style>
    body { background-color: #1b222d; color: #e6edf3; font-family: "Inter", sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 40px; margin: 0; }
    
    .language-tabs { display: flex; gap: 4px; margin-bottom: -1px; z-index: 1; width: 94%; max-width: 400px; padding-left: 10px; box-sizing: border-box; }
    .lang-tab { padding: 8px 16px; background: #232a3b; border: 1px solid #343e50; border-bottom: none; border-radius: 8px 8px 0 0; color: #8b949e; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.2s; }
    .lang-tab:hover { background: #2c354a; }
    .lang-tab.active { background: #4e73df; color: #fff; border-color: #4e73df; }

    .page-tabs { display: flex; gap: 12px; width: 94%; max-width: 400px; margin-top: 12px; margin-bottom: 12px; justify-content: center; }
    .page-btn { flex: 1; text-align: center; padding: 10px 0; background: #232a3b; border-radius: 40px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; color: #8b949e; border: 1px solid #343e50; }
    .page-btn.active { background: #4e73df; color: #fff; border-color: #4e73df; }

    .calculator { background-color: #232a3b; border-radius: 12px; padding: 30px; width: 94%; max-width: 400px; box-sizing: border-box; border: 1px solid #343e50; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); position: relative; z-index: 2; }
    .time-field { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0 18px; border: 1px solid #343e50; border-radius: 8px; background: transparent; color: #fff; font-size: 19px; cursor: pointer; text-align: left; }
    .label { color: #8b949e; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

    .prep-card { border: 1px solid #343e50; border-radius: 8px; padding: 15px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .radio-circle { width: 20px; height: 20px; border: 2px solid #8b949e; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .prep-card.active { border-color: #58a6ff; background: rgba(88, 166, 255, 0.05); }
    .prep-card.active .radio-circle { border-color: #58a6ff; }
    .radio-dot { width: 10px; height: 10px; background: #58a6ff; border-radius: 50%; display: none; }
    .prep-card.active .radio-dot { display: block; }

    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: 600; color: #fff; cursor: pointer; font-size: 17px; }
    .btn-calc { background: #4e73df; }
    .btn-info { background: #343e50; border: 1px solid #454f63; }
    .btn-save-res { background: #232a3b; border: 1px solid #3cd4a0; color: #3cd4a0; margin-top: 15px; width: 100%; }
    .btn-save-res:hover { background: rgba(60, 212, 160, 0.1); }

    .picker-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); align-items: flex-start; padding-top: 20px; }
    .picker-container { background: #1b222d; width: 90%; max-width: 340px; border-radius: 20px; padding: 20px; border: 1px solid #343e50; }

    .picker-wheels { display: flex; justify-content: center; height: 200px; overflow: hidden; position: relative; gap: 5px; }
    .wheel { flex: 1; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
    .wheel div { height: 40px; line-height: 40px; font-size: 24px; color: #8b949e; scroll-snap-align: center; opacity: 0.2; }
    .wheel div.selected { color: #fff; opacity: 1; font-size: 29px; font-weight: bold; }
    .wheel div.spacer { height: 80px; }
    .picker-highlight { position: absolute; top: 80px; left: 0; width: 100%; height: 40px; background: rgba(255,255,255,0.07); border-radius: 8px; pointer-events: none; }

    .history-card { background: #232a3b; border-radius: 12px; padding: 25px; margin-top: 25px; border: 1px solid #343e50; text-align: center; }
    .chart-container { position: relative; width: 180px; height: 180px; margin: 0 auto 20px; }
    .chart-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .chart-bg { fill: none; stroke: #343e50; stroke-width: 12; }
    .chart-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .chart-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; }
    .chart-percent { font-size: 46px; font-weight: bold; display: block; }
    .chart-label { font-size: 14px; color: #8b949e; text-transform: uppercase; margin-top: 5px; display: block; }

    .status-alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 16px; font-weight: 500; text-align: left; border-left: 4px solid transparent; color: #ffffff !important; }
    .alert-red { background: rgba(240, 103, 103, 0.25); border-left-color: #f06767; }
    .alert-orange { background: rgba(255, 152, 0, 0.25); border-left-color: #ff9800; }
    .alert-green { background: rgba(60, 212, 160, 0.25); border-left-color: #3cd4a0; }

    .legend { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; font-size: 14px; color: #8b949e; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    .stat-list { text-align: left; border-top: 1px solid #343e50; padding-top: 15px; }
    .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 16px; }
    .item-label { display: flex; align-items: center; gap: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .input-row { display: flex; gap: 15px; margin-bottom: 25px; align-items: stretch; width: 100%; box-sizing: border-box; }
    .input-row .time-field { flex: 1; margin: 0; background: #161c24; font-size: 24px; font-weight: bold; outline: none; transition: border-color 0.2s; }
    .input-row .time-field:focus { border-color: #5882fa; }
    .btn-add { width: 90px; padding: 0; border: none; border-radius: 8px; background: #5882fa; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-add:hover { background: #476be0; }

    .tags-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px; }
    .percent-tag { color: #fff; padding: 12px 5px; border-radius: 8px; font-size: 22px; font-weight: bold; text-align: center; cursor: pointer; user-select: none; transition: transform 0.1s, background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .percent-tag:active { transform: scale(0.95); }

    .instr-white { color: #ffffff !important; font-size: 17px !important; line-height: 1.5; }
    .page { display: none; }
    .page.active-page { display: block; }

    .top-header { display: flex; justify-content: space-between; align-items: center; width: 94%; max-width: 400px; margin-bottom: 15px; }
    .users-badge { background: rgba(88, 166, 255, 0.1); color: #58a6ff; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; border: 1px solid rgba(88, 166, 255, 0.3); }
    .profile-btn { background: #232a3b; color: #e6edf3; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid #343e50; transition: 0.2s; }
    
    .profile-dashboard { display: flex; flex-direction: column; gap: 20px; }
    .dash-section-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 10px; }
    
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-bottom: 10px; }
    .cal-header { color: #8b949e; font-size: 12px; padding-bottom: 5px; }
    .cal-day { width: 32px; height: 32px; line-height: 32px; margin: auto; border-radius: 50%; font-size: 14px; color: #8b949e; }
    .cal-day.active { color: #fff; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    
    .chart-box { background: #232a3b; border: 1px solid #343e50; border-radius: 12px; padding: 15px; position: relative; }
    .line-chart-svg { width: 100%; height: 120px; overflow: visible; }
    .line-path { fill: none; stroke: #58a6ff; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .chart-grid-line { stroke: #343e50; stroke-width: 1; }
    .chart-labels { display: flex; justify-content: space-between; color: #8b949e; font-size: 11px; margin-top: 5px; }
    
    .hist-card { background: #232a3b; border: 1px solid #343e50; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    .hc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .hc-pro { font-size: 18px; font-weight: bold; color: #fff; }
    .hc-type { font-size: 13px; color: #8b949e; margin-top: 4px; }
    .hc-stan { background: #1b222d; border: 1px solid #343e50; padding: 5px 15px; border-radius: 8px; text-align: center; }
    .hc-row { display: flex; justify-content: space-between; font-size: 14px; color: #e6edf3; margin-bottom: 8px; }
    .hc-progress-bg { background: #1b222d; height: 6px; border-radius: 3px; margin: 15px 0 10px; overflow: hidden; }
    .hc-progress-fill { height: 100%; border-radius: 3px; }
    .hc-footer { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    
    .hc-actions { display: flex; gap: 12px; margin-bottom: 10px; justify-content: flex-end; }
    .hc-act-btn { cursor: pointer; opacity: 0.7; font-size: 16px; transition: 0.2s; }
    .hc-act-btn:hover { opacity: 1; transform: scale(1.1); }

    select option { background: #232a3b; color: #fff; }
  </style>

<body>

  <div class="top-header">
    <div class="users-badge" id="globalUserCount">users: ...</div>
    <div class="profile-btn" id="profileBtnText" onclick="openProfile()">Профиль</div>
  </div>

  <div class="language-tabs">
    <div class="lang-tab" data-lang="Eng">Eng</div>
    <div class="lang-tab" data-lang="Pol">Pol</div>
    <div class="lang-tab" data-lang="Esp">Esp</div>
    <div class="lang-tab" data-lang="Ukr">Ukr</div>
    <div class="lang-tab active" data-lang="Pyc">Pyc</div>
  </div>

  <div class="page-tabs">
    <div class="page-btn active" data-page="norm" id="tab_norm">Норма</div>
    <div class="page-btn" data-page="percent" id="tab_percent">Проценты</div>
  </div>

  <div id="normPage" class="calculator page active-page">
    <label class="label" id="l_qty">Количество штук</label>
    <input type="number" id="quantity" class="time-field" placeholder="0">

    <label class="label" id="l_tpi">Время на 1 штуку</label>
    <div id="timePerItem" class="time-field" onclick="openPicker('timePerItem')">00:00:30</div>

    <div class="prep-card" id="prepToggle" onclick="togglePrep()">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="radio-circle"><div class="radio-dot" id="radioDot" style="display:none;"></div></div>
        <span><b style="font-size: 19px;" id="l_prep">Подготовка</b><br><small style="color:#8b949e; font-size:14px;" id="l_prepSub">15 минут к норме</small></span>
      </div>
      <div id="statusLabel" class="status-text" style="font-size:14px; color:#8b949e; font-weight:bold;">НЕ АКТИВНО</div>
    </div>

    <label class="label" id="l_start">Начало</label>
    <div id="startTime" class="time-field" onclick="openPicker('startTime', true)">08:00</div>

    <label class="label" id="l_end">Окончание</label>
    <div id="endTime" class="time-field" onclick="openPicker('endTime')">00:00:00</div>

    <div class="btn-group">
      <button class="btn btn-calc" id="b_calc" onclick="calculate()">Рассчитать</button>
      <button class="btn btn-info" id="b_info" onclick="openModal('infoOverlayNorm')">Инструкция</button>
    </div>
    <div id="result"></div>
  </div>

  <div id="percentPage" class="calculator page">
    <label class="label" id="l_enter_percent">Введите процент</label>
    <div class="input-row">
      <input type="number" id="percentInput" class="time-field" placeholder="0" min="0" max="100">
      <button class="btn-add" onclick="addPercent()">+ %</button>
    </div>

    <div id="tagsContainer" class="tags-grid"></div>

    <div class="btn-group">
      <button class="btn btn-calc" id="b_calc_percent" onclick="calculateAverage()">Рассчитать</button>
      <button class="btn btn-info" id="b_info_percent" onclick="openModal('infoOverlayProc')">Инструкция</button>
    </div>
    <div id="resultPercent"></div>
  </div>

  <div id="infoOverlayNorm" class="picker-overlay">
    <div class="picker-container" style="width:90%; max-width:360px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#1b222d; padding-bottom:10px; z-index:10;">
        <b style="font-size:22px; color:#fff;" id="i_title_norm">Инструкция</b>
        <span onclick="closeModal('infoOverlayNorm')" style="color:#58a6ff; cursor:pointer; font-weight:bold; font-size:17px;">X</span>
      </div>
      <div id="instructionContentNorm"></div>
    </div>
  </div>

  <div id="infoOverlayProc" class="picker-overlay">
    <div class="picker-container" style="width:90%; max-width:360px; max-height:85vh; overflow-y:auto;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; position:sticky; top:0; background:#1b222d; padding-bottom:10px; z-index:10;">
        <b style="font-size:22px; color:#fff;" id="i_title_proc">Инструкция</b>
        <span onclick="closeModal('infoOverlayProc')" style="color:#58a6ff; cursor:pointer; font-weight:bold; font-size:17px;">X</span>
      </div>
      <div id="instructionContentProc"></div>
    </div>
  </div>

  <div id="pickerOverlay" class="picker-overlay">
    <div class="picker-container">
      <div style="display:flex; justify-content:space-between; margin-bottom:15px; color:#fff; font-size:17px;">
        <span onclick="closePicker()" id="p_cancel" style="color:#58a6ff; cursor:pointer;">Отмена</span>
        <b id="p_title">Время</b>
        <span onclick="confirmPicker()" id="p_done" style="color:#58a6ff; cursor:pointer;">Готово</span>
      </div>
      <div class="picker-wheels">
        <div class="picker-highlight"></div>
        <div class="wheel" id="hWheel"></div><div class="wheel" id="mWheel"></div><div class="wheel" id="sWheel"></div>
      </div>
    </div>
  </div>

  <div id="saveModalOverlay" class="picker-overlay" style="z-index: 10005;">
    <div class="picker-container" style="width:90%; max-width:320px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:20px; color:#fff;">
        <b style="font-size:20px;" id="s_title">Сохранение результата</b>
      </div>
      
      <label class="label" id="s_pro">PRO (можно с тире)</label>
      <input type="text" id="savePro" class="time-field" placeholder="001-003">
      
      <label class="label" id="s_stan">Номер Stanowiska</label>
      <input type="number" id="saveStanowisko" class="time-field" placeholder="8">
      
      <label class="label" id="s_type">Вид работы</label>
      <select id="saveWorkType" class="time-field" style="appearance: auto; font-size: 16px;">
        </select>

      <label class="label" id="s_uwagi">Uwagi (заметки)</label>
      <input type="text" id="saveUwagi" class="time-field" placeholder="...">
      
      <div class="btn-group" style="margin-top: 10px;">
        <button class="btn btn-calc" id="s_btn_save" onclick="confirmSave()">Сохранить</button>
        <button class="btn btn-info" id="s_btn_cancel" onclick="closeModal('saveModalOverlay')">Отмена</button>
      </div>
    </div>
  </div>

      <div style="display:flex; justify-content:space-between; margin-bottom:15px; position:sticky; top:-20px; background:#1b222d; padding:20px 0 10px; z-index:10; border-bottom: 1px solid #343e50;">

      </div>
      
      <div id="profileHistoryContent">
        </div>
    </div>
  </div>

    let currentLang = 'Pyc';
    let percentList = [];
    let savedHistory = [];
    let pendingSaveData = null; 
    let editIndex = -1;

    function initAppData() {
        try {
            if (tgApp && tgApp.CloudStorage) {
                tgApp.CloudStorage.getItem('kkn_history_v2', function(err, value) {
                    if (!err && value) savedHistory = JSON.parse(value);
                });
            } else {
                const local = localStorage.getItem('kkn_history_v2');
                if (local) savedHistory = JSON.parse(local);
            }
        } catch(e) {}
        document.getElementById('globalUserCount').textContent = "users: 64"; 
    }

    // -------------------------- СОХРАНЕНИЕ / РЕДАКТИРОВАНИЕ / УДАЛЕНИЕ --------------------------
    function openSaveModal(isEdit, idx) {
        editIndex = isEdit ? idx : -1;
        if (!isEdit && !pendingSaveData) return;
        
        if (isEdit && idx > -1) {
            const rec = savedHistory[idx];
            document.getElementById('savePro').value = rec.pro || "";
            document.getElementById('saveStanowisko').value = rec.stan || "";
            document.getElementById('saveWorkType').value = rec.wTypeKey || 't1';
            document.getElementById('saveUwagi').value = rec.uwagi || "";
        } else {
            document.getElementById('savePro').value = '';
            document.getElementById('saveStanowisko').value = '';
            document.getElementById('saveWorkType').value = 't1';
            document.getElementById('saveUwagi').value = '';
        }
        openModal('saveModalOverlay');
    }

    function confirmSave() {
        const proVal = document.getElementById('savePro').value;
        const stanVal = document.getElementById('saveStanowisko').value;
        const wTypeKey = document.getElementById('saveWorkType').value;
        const uwagiVal = document.getElementById('saveUwagi').value;

        if(!proVal || !stanVal) {
            if(tgApp && tgApp.showAlert) tgApp.showAlert("Заполните поля PRO и Stanowisko"); else alert("Заполните поля!");
            return;
        }

        if (editIndex > -1) {
            savedHistory[editIndex].pro = proVal;
            savedHistory[editIndex].stan = stanVal;
            savedHistory[editIndex].wTypeKey = wTypeKey;
            savedHistory[editIndex].uwagi = uwagiVal;
        } else {
            const record = Object.assign({}, pendingSaveData, {
                pro: proVal, 
                stan: stanVal,
                wTypeKey: wTypeKey,
                uwagi: uwagiVal,
                timestamp: Date.now(),
                dateStr: new Date().toLocaleDateString('ru-RU') 
            });
            savedHistory.unshift(record);
            if (savedHistory.length > 50) savedHistory.pop(); 
        }
        
        try {
            if (tgApp && tgApp.CloudStorage) tgApp.CloudStorage.setItem('kkn_history_v2', JSON.stringify(savedHistory), function(){});
            else localStorage.setItem('kkn_history_v2', JSON.stringify(savedHistory));
        } catch(e){}
        
        closeModal('saveModalOverlay');
        
        if(document.getElementById('profileOverlay').style.display === 'flex') openProfile();

        if(tgApp && tgApp.showAlert) tgApp.showAlert(tr[currentLang].dash.saved);
        else alert(tr[currentLang].dash.saved);
    }

    function deleteRecord(idx) {
        if (confirm(tr[currentLang].dash.confirmDel)) {
            savedHistory.splice(idx, 1);
            try {
                if (tgApp && tgApp.CloudStorage) tgApp.CloudStorage.setItem('kkn_history_v2', JSON.stringify(savedHistory), function(){});
                else localStorage.setItem('kkn_history_v2', JSON.stringify(savedHistory));
            } catch(e){}
            openProfile(); 
        }
    }

    // -------------------------- РЕНДЕР ДАШБОРДА И ПОИСК --------------------------
    function getColorForPercent(p) {
        if (p < 65) return "#f06767";
        if (p < 75) return "#ff9800";
        return "#3cd4a0";
    }

    // Функция отрисовки только карточек (для работы поиска без мерцания)
    function renderHistoryCards(searchText) {
        const t = tr[currentLang];
        const container = document.getElementById('historyCardsContainer');
        if (!container) return;
        
        let html = "";
        let filterStr = searchText ? searchText.replace(/[^a-zA-Z0-9]/g, '').toLowerCase() : "";

        savedHistory.forEach(function(item, idx) {
            let itemPro = item.pro ? item.pro.replace(/[^a-zA-Z0-9]/g, '').toLowerCase() : "";
            if (filterStr && itemPro.indexOf(filterStr) === -1) return; // Пропуск если не совпадает

            let iClr = getColorForPercent(item.result);
            let typeText = item.wTypeKey ? t.dash.types[item.wTypeKey] : (item.wType || t.dash.types['t1']);

            let innerRows = item.type === 'norm' ? 
                "<div class='hc-row'><span>" + t.dash.lblDate + "</span> <span>" + item.dateStr + "</span></div>" +
                "<div class='hc-row'><span>" + t.dash.lblStart + "</span> <span>" + item.start + "</span></div>" +
                "<div class='hc-row'><span>" + t.dash.lblEnd + "</span> <span>" + item.end + "</span></div>" 
                : 
                "<div class='hc-row'><span>" + t.dash.lblDate + "</span> <span>" + item.dateStr + " (" + t.dash.lblAvg + ")</span></div>";
                
            if (item.uwagi) {
                innerRows += "<div class='hc-row'><span style='color:#ff9800'>Uwagi:</span> <span style='text-align:right; max-width:65%; word-break:break-all;'>" + item.uwagi + "</span></div>";
            }

            let footerAdd = item.type === 'norm' ? "<span>USTAWIENIA <span style='color:" + (item.prep ? "#3cd4a0" : "#8b949e") + "'>" + (item.prep ? "Tak" : "Nie") + "</span></span>" : "";
            let qtyAdd = item.qty ? "<div style='background:#1b222d; padding:4px 10px; border-radius:6px; color:#e6edf3;'>" + item.qty + " SZT.</div>" : "";

            html += 
            "<div class='hist-card'>" +
                "<div class='hc-top'>" +
                    "<div style='flex:1;'>" +
                        "<div class='hc-pro'>PRO-" + item.pro + "</div>" +
                        "<div class='hc-type'>" + typeText + "</div>" +
                    "</div>" +
                    "<div style='display:flex; flex-direction:column; align-items:flex-end;'>" +
                        "<div class='hc-actions'>" +
                            "<span class='hc-act-btn' onclick='openSaveModal(true, " + idx + ")'>✏️</span>" +
                            "<span class='hc-act-btn' onclick='deleteRecord(" + idx + ")'>🗑️</span>" +
                        "</div>" +
                        "<div class='hc-stan'><small style='color:#8b949e'>Stanowisko</small><br><b style='color:#fff; font-size:16px'>" + item.stan + "</b></div>" +
                    "</div>" +
                "</div>" +
                innerRows +
                "<div class='hc-progress-bg'>" +
                    "<div class='hc-progress-fill' style='width:" + Math.min(item.result, 100) + "%; background:" + iClr + "'></div>" +
                "</div>" +
                "<div class='hc-footer'>" +
                    "<span style='color:" + iClr + "; font-weight:bold; font-size:18px;'>" + item.result + "%</span>" +
                    footerAdd + qtyAdd +
                "</div>" +
            "</div>";
        });

        if (html === "") html = "<div class='history-empty'>" + t.dash.noData + "</div>";
        container.innerHTML = html;
    }

    // Обработчик ввода для поля поиска
    window.filterHistory = function() {
        const val = document.getElementById('proSearchInput').value;
        renderHistoryCards(val);
    };

    function openProfile() {
        const t = tr[currentLang];
        const container = document.getElementById('profileHistoryContent');
        if (savedHistory.length === 0) {
            container.innerHTML = "<div class='history-empty'>" + t.dash.empty + "</div>";
            openModal('profileOverlay');
            return;
        }

        const now = new Date();
        const currentMonth = now.getMonth();
        const currentYear = now.getFullYear();
        let lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
        let lastMonthYear = currentMonth === 0 ? currentYear - 1 : currentYear;
        
        const monthRecords = [];
        let totalSecThisMonth = 0;
        let totalSecLastMonth = 0;
        const dayAverages = {}; 

        // Перебор истории: сбор графиков и подсчет рабочего времени
        savedHistory.forEach(function(r) {
            const d = new Date(r.timestamp);
            const m = d.getMonth();
            const y = d.getFullYear();

            // Для кругового графика и календаря
            if (m === currentMonth && y === currentYear) {
                monthRecords.push(r);
                const day = d.getDate();
                if(!dayAverages[day]) dayAverages[day] = [];
                dayAverages[day].push(r.result);
            }

            // Для подсчета рабочих часов (только нормы с временем)
            if (r.type === 'norm' && r.start && r.end) {
                let s = parseToSec(r.start);
                let e = parseToSec(r.end);
                let diff = e >= s ? e - s : (86400 - s) + e;
                
                if (m === currentMonth && y === currentYear) totalSecThisMonth += diff;
                else if (m === lastMonth && y === lastMonthYear) totalSecLastMonth += diff;
            }
        });

        let monthAvg = 0;
        if (monthRecords.length > 0) {
            const sum = monthRecords.reduce(function(a, b) { return a + b.result; }, 0);
            monthAvg = Math.round(sum / monthRecords.length);
        }
        const mClr = getColorForPercent(monthAvg);
        const mOff = 440 - (440 * Math.min(monthAvg, 100)) / 100;
        let mZn = monthAvg < 65 ? t.zones.risk : monthAvg < 75 ? t.zones.orange : t.zones.green;
        let mMsg = monthAvg < 65 ? t.msgs.fail : monthAvg < 75 ? t.msgs.push : t.msgs.good;

        // Блок Календаря
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let calHtml = "<div class='dash-section-title'>" + t.dash.cal + " (" + (monthRecords.length > 0 ? '1 - ' + daysInMonth : t.dash.noData) + ")</div>" +
                      "<div class='cal-grid'>" +
                      "<div class='cal-header'>" + t.dash.days[0] + "</div><div class='cal-header'>" + t.dash.days[1] + "</div><div class='cal-header'>" + t.dash.days[2] + "</div><div class='cal-header'>" + t.dash.days[3] + "</div><div class='cal-header'>" + t.dash.days[4] + "</div><div class='cal-header'>" + t.dash.days[5] + "</div><div class='cal-header'>" + t.dash.days[6] + "</div>";
        
        let firstDay = new Date(currentYear, currentMonth, 1).getDay();
        firstDay = firstDay === 0 ? 7 : firstDay; 
        for(let i=1; i<firstDay; i++) { calHtml += "<div></div>"; }

        for(let i=1; i<=daysInMonth; i++) {
            if (dayAverages[i]) {
                let dAvg = Math.round(dayAverages[i].reduce(function(a,b){return a+b},0)/dayAverages[i].length);
                let dClr = getColorForPercent(dAvg);
                calHtml += "<div class='cal-day active' style='background:" + dClr + "'>" + i + "</div>";
            } else {
                calHtml += "<div class='cal-day'>" + i + "</div>";
            }
        }
        calHtml += "</div>";

        // Блок Часов работы (под календарем)
        let hoursThisMonth = Math.round(totalSecThisMonth / 3600);
        let hoursLastMonth = Math.round(totalSecLastMonth / 3600);
        let workHoursHtml = 
            "<div style='margin: 15px 0 10px; font-size: 15px; text-align: center; background: #232a3b; border: 1px solid #343e50; border-radius: 8px; padding: 12px;'>" +
                "<div style='margin-bottom: 5px;'><span style='color:#8b949e'>" + t.workTime.thisMonth + " </span><b style='color:#3cd4a0; font-size:17px;'>" + hoursThisMonth + " " + t.workTime.h + "</b></div>" +
                "<div><span style='color:#8b949e'>" + t.workTime.lastMonth + " </span><b style='color:#fff'>" + hoursLastMonth + " " + t.workTime.h + "</b></div>" +
            "</div>";

        // Блок Динамики
        let chartHtml = '';
        const activeDays = Object.keys(dayAverages).sort(function(a,b){return a-b});
        if (activeDays.length > 1) {
            let points = "";
            const width = 300; const height = 100;
            const xStep = width / (activeDays.length - 1);
            activeDays.forEach(function(day, index) {
                let val = Math.round(dayAverages[day].reduce(function(a,b){return a+b},0)/dayAverages[day].length);
                if (val > 100) val = 100;
                let x = index * xStep;
                let y = height - ((val / 100) * height);
                points += x + "," + y + " ";
            });
            chartHtml = 
            "<div class='dash-section-title' style='margin-top:20px;'>" + t.dash.dyn + "</div>" +
            "<div class='chart-box'>" +
                "<svg viewBox='0 -10 300 120' class='line-chart-svg'>" +
                    "<line x1='0' y1='0' x2='300' y2='0' class='chart-grid-line'/>" +
                    "<line x1='0' y1='50' x2='300' y2='50' class='chart-grid-line'/>" +
                    "<line x1='0' y1='100' x2='300' y2='100' class='chart-grid-line'/>" +
                    "<polyline points='" + points.trim() + "' class='line-path' />" +
                "</svg>" +
                "<div class='chart-labels'><span>" + activeDays[0] + " " + t.dash.date + "</span><span>" + activeDays[activeDays.length-1] + " " + t.dash.date + "</span></div>" +
            "</div>";
        }

        // Блок Поиска и Истории
        let searchAndHistoryHtml =

                    "<div style='background: rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-top:10px;'>" +
                        "<span style='color:#8b949e; font-size:14px;'>" + t.dash.zonePrefix + "</span><br>" +
                        "<b style='color:#fff; font-size:16px;'>" + mZn + "</b><br>" +
                        "<b style='color:" + mClr + "; font-size:14px;'>" + mMsg + "</b>" +
                    "</div>" +
                "</div>" +
                calHtml +
                workHoursHtml +
                chartHtml +
                searchAndHistoryHtml +
            "</div>";
            
        renderHistoryCards(""); // Отрисовываем карточки внутри контейнера
        openModal('profileOverlay');
    }

    // -------------------------- UI LOGIC И КАЛЬКУЛЯТОР --------------------------
    document.querySelectorAll('.page-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const page = btn.getAttribute('data-page');
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active-page'); });
        document.getElementById(page + 'Page').classList.add('active-page');
        document.querySelectorAll('.page-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
      });
    });

    document.querySelectorAll('.lang-tab').forEach(function(tab) {
      tab.addEventListener('click', function() { setLang(tab.getAttribute('data-lang')); });
    });

    function setLang(lang) {
      currentLang = lang;
      const t = tr[lang] || tr['Pyc'];
      document.querySelectorAll('.lang-tab').forEach(function(el) {
        if (el.getAttribute('data-lang') === lang) el.classList.add('active'); else el.classList.remove('active');
      });
      document.getElementById('tab_norm').textContent = t.tabs.norm;
      document.getElementById('tab_percent').textContent = t.tabs.percent;
      document.getElementById('l_qty').textContent = t.labels.qty;
      document.getElementById('l_tpi').textContent = t.labels.tpi;
      document.getElementById('l_prep').textContent = t.labels.prep;
      document.getElementById('l_prepSub').textContent = t.labels.prepSub;
      document.getElementById('l_start').textContent = t.labels.start;
      document.getElementById('l_end').textContent = t.labels.end;
      document.getElementById('b_calc').textContent = t.btns.calc;
      document.getElementById('b_info').textContent = t.btns.info;
      document.getElementById('p_cancel').textContent = t.btns.cancel;
      document.getElementById('p_done').textContent = t.btns.done;
      document.getElementById('p_title').textContent = t.btns.pick;
      document.getElementById('i_title_norm').textContent = t.btns.info;
      
      // Переводы новых модалок и профиля
      document.getElementById('profileBtnText').textContent = t.btns.profile;
      document.getElementById('profileCloseBtn').textContent = t.btns.close;
      document.getElementById('s_title').textContent = t.saveModal.title;
      document.getElementById('s_pro').textContent = t.saveModal.pro;
      document.getElementById('s_stan').textContent = t.saveModal.stan;
      document.getElementById('s_type').textContent = t.saveModal.type;
      document.getElementById('s_uwagi').textContent = t.workTime.uwagi;
      document.getElementById('s_btn_save').textContent = t.saveModal.btnSave;
      document.getElementById('s_btn_cancel').textContent = t.saveModal.btnCancel;
      
      const sel = document.getElementById('saveWorkType');
      sel.innerHTML = "<option value='t1'>" + t.dash.types.t1 + "</option><option value='t2'>" + t.dash.types.t2 + "</option><option value='t3'>" + t.dash.types.t3 + "</option>";

      const sInp = document.getElementById('proSearchInput');
      if (sInp) sInp.placeholder = t.workTime.search;

      updatePrepStatus();

      let htmlNorm = '';
      t.instrNorm.forEach(function(item) { htmlNorm += "<div style='background:#232a3b; border-radius:8px; margin-bottom:8px; border:1px solid #343e50;'><div style='padding:16px; display:flex; justify-content:space-between; cursor:pointer; color:#58a6ff; font-size:17px;' onclick='toggleAccordion(this)'>" + item.t + " <span>▼</span></div><div class='instr-white' style='padding:0 16px 16px; display:none;'>" + item.c + "</div></div>"; });
      document.getElementById('instructionContentNorm').innerHTML = htmlNorm;

      document.getElementById('l_enter_percent').textContent = t.labelsPercent.enterPercent;
      document.getElementById('b_calc_percent').textContent = t.btns.calc;
      document.getElementById('b_info_percent').textContent = t.btns.info;
      document.getElementById('i_title_proc').textContent = t.btns.info;
      let htmlProc = '';
      t.instrProc.forEach(function(item) { htmlProc += "<div style='background:#232a3b; border-radius:8px; margin-bottom:8px; border:1px solid #343e50;'><div style='padding:16px; display:flex; justify-content:space-between; cursor:pointer; color:#58a6ff; font-size:17px;' onclick='toggleAccordion(this)'>" + item.t + " <span>▼</span></div><div class='instr-white' style='padding:0 16px 16px; display:none;'>" + item.c + "</div></div>"; });
      document.getElementById('instructionContentProc').innerHTML = htmlProc;

      if(document.getElementById('profileOverlay').style.display === 'flex') openProfile();
      if(document.getElementById('result').innerHTML !== "") calculate();
      if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage();
    }

    let isPrepActive = false, activeField = null, shortFormat = false;
    function initWheel(id, max) {
      const w = document.getElementById(id); w.innerHTML = '<div class="spacer"></div>';
      for (let i=0; i<=max; i++) { 
          let d = document.createElement('div'); 
          d.textContent = (i < 10 ? "0" : "") + i; 
          w.appendChild(d); 
      }
      w.innerHTML += '<div class="spacer"></div>';
      w.onscroll = function() { 
          let idx = Math.round(w.scrollTop/40); 
          w.querySelectorAll('div:not(.spacer)').forEach(function(item, i) {
              if(i === idx) item.classList.add('selected');
              else item.classList.remove('selected');
          }); 
      };
    }
    initWheel('hWheel', 23); initWheel('mWheel', 59); initWheel('sWheel', 59);
    
    function openPicker(id, isShort) { 
        activeField = id; 
        shortFormat = isShort || false; 
        document.getElementById('sWheel').style.display = shortFormat ? 'none' : 'block'; 
        document.getElementById('pickerOverlay').style.display = 'flex'; 
    }
    function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }
    function confirmPicker() {
      const hEl = document.querySelector('#hWheel .selected');
      const mEl = document.querySelector('#mWheel .selected');
      const sEl = document.querySelector('#sWheel .selected');
      const h = hEl ? hEl.textContent : "00";
      const m = mEl ? mEl.textContent : "00";
      const s = sEl ? sEl.textContent : "00";
      document.getElementById(activeField).textContent = shortFormat ? (h + ":" + m) : (h + ":" + m + ":" + s); 
      closePicker();
    }
    function togglePrep() { isPrepActive = !isPrepActive; updatePrepStatus(); }
    function updatePrepStatus() {
      const t = tr[currentLang];
      document.getElementById('radioDot').style.display = isPrepActive ? 'block' : 'none';
      if(isPrepActive) document.getElementById('prepToggle').classList.add('active');
      else document.getElementById('prepToggle').classList.remove('active');
      document.getElementById('statusLabel').textContent = isPrepActive ? t.labels.active : t.labels.inactive;
      document.getElementById('statusLabel').style.color = isPrepActive ? '#3cd4a0' : '#8b949e';
    }
    function parseToSec(str) { let p = str.split(':').map(Number); return p.length === 3 ? p[0]*3600 + p[1]*60 + p[2] : p[0]*3600 + p[1]*60; }
    function formatTime(s) { 
        let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.round(s%60); 
        return (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec; 
    }
    
    function calculate() {
      const q = parseFloat(document.getElementById('quantity').value) || 0; if (!q) return;
      const t = tr[currentLang];
      const tpi = parseToSec(document.getElementById('timePerItem').textContent), prep = isPrepActive ? 900 : 0, norm = (q * tpi) + prep;
      const startStr = document.getElementById('startTime').textContent;
      const start = parseToSec(startStr), plan = formatTime((start + norm) % 86400), endStr = document.getElementById('endTime').textContent;
      let eff = 0, spent = "--:--:--", spentPer = "--:--:--", neededQty = 0;
      
      if (endStr !== "00:00:00") { 
        let FactS = parseToSec(endStr), FactT = FactS >= start ? FactS - start : (86400 - start) + FactS; 
        eff = Math.round((norm / FactT) * 100); 
        spent = formatTime(FactT); 
        spentPer = formatTime((FactT - prep) / q); 
        neededQty = tpi > 0 ? Math.floor(Math.max(0, FactT - prep) / tpi) : 0;
        
        pendingSaveData = { type: 'norm', result: eff, qty: q, start: startStr, end: endStr, prep: isPrepActive };
      }

      let qph = tpi > 0 ? 3600 / tpi : 0, maxQph = Math.floor(qph);
      let clr = "#8b949e", zn = "---", msg = "", alrt = "";
      if (eff > 0) {
        if (eff < 65) { clr="#f06767"; zn=t.zones.risk; msg=t.msgs.fail; alrt="alert-red"; }
        else if (eff < 75) { clr="#ff9800"; zn=t.zones.orange; msg=t.msgs.push; alrt="alert-orange"; }
        else if (eff <= 100) { clr="#3cd4a0"; zn=t.zones.green; msg=t.msgs.good; alrt="alert-green"; }
        else { clr="#f06767"; zn=t.zones.over; msg=t.msgs.over; alrt="alert-red"; }
      }
      const off = 440 - (440 * Math.min(eff, 100)) / 100;
      
      let html = "<div class='history-card'><div class='chart-container'><svg class='chart-svg' viewBox='0 0 160 160'><circle class='chart-bg' cx='80' cy='80' r='70' /><circle class='chart-fill' cx='80' cy='80' r='70' style='stroke:" + clr + "; stroke-dasharray:440; stroke-dashoffset:" + off + ";' /></svg><div class='chart-text'><span class='chart-percent' style='color:" + clr + "'>" + eff + "%</span><span class='chart-label'>" + t.stats.success + "</span></div></div><div class='status-alert " + alrt + "'>" + t.stats.zone + " <b>" + zn + "</b><br>" + msg + "</div><div class='legend'><div class='legend-item'><div class='legend-dot' style='background:#f06767'></div>" + t.legend[0] + "</div><div class='legend-item'><div class='legend-dot' style='background:#ff9800'></div>" + t.legend[1] + "</div><div class='legend-item'><div class='legend-dot' style='background:#3cd4a0'></div>" + t.legend[2] + "</div></div><div class='stat-list'><div class='stat-item'><div class='item-label'><div class='dot' style='background:#3cd4a0'></div>" + t.stats.plan + "</div><b>" + plan + "</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#f06767'></div>" + t.stats.norm + "</div><b>" + formatTime(norm) + "</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#9c27b0'></div>" + t.stats.qtyPerHour + "</div><b>" + maxQph + " шт.</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#ffeb3b'></div>" + t.stats.forThisTime + "</div><b>" + neededQty + " шт.</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#00bcd4'></div>" + t.stats.spent1 + "</div><b>" + spentPer + "</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#4e73df'></div>" + t.stats.spentNorm + "</div><b>" + spent + "</b></div><div class='stat-item'><div class='item-label'><div class='dot' style='background:#ff9800'></div>" + t.stats.fact + "</div><b>" + endStr + "</b></div></div>";
      
      if (endStr !== "00:00:00") {
         html += "<button class='btn btn-save-res' onclick='openSaveModal(false, -1)'>" + t.btns.saveRes + "</button>";
      }
      html += "</div>";
      
      document.getElementById('result').innerHTML = html;
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function addPercent() {
      const input = document.getElementById('percentInput');
      const val = parseInt(input.value);
      if (!isNaN(val) && val >= 0 && val <= 100) {
        percentList.push(val);
        input.value = '';
        renderTags();
        if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage();
      }
      input.focus();
    }
    
    function renderTags() {
      const container = document.getElementById('tagsContainer');
      container.innerHTML = '';
      percentList.forEach(function(p, idx) {
        let tag = document.createElement('div');
        tag.className = 'percent-tag';
        tag.style.background = getColorForPercent(p);
        tag.textContent = p + ' %';
        tag.onclick = function() { percentList.splice(idx, 1); renderTags(); if(document.getElementById('resultPercent').innerHTML !== "") calculateAverage(); };
        container.appendChild(tag);
      });
    }

    function calculateAverage() {
      const resultDiv = document.getElementById('resultPercent');
      if (percentList.length === 0) { resultDiv.innerHTML = ''; return; }
      const t = tr[currentLang];
      let sum = percentList.reduce(function(a, b) { return a + b; }, 0);
      let eff = Math.round(sum / percentList.length);
      
      pendingSaveData = { type: 'percent', result: eff, qty: null };

      let clr = "#8b949e", zn = "---", msg = "", alrt = "";
      if (eff < 65) { clr="#f06767"; zn=t.zonesPercent.risk; msg=t.msgsPercent.fail; alrt="alert-red"; }
      else if (eff < 75) { clr="#ff9800"; zn=t.zonesPercent.orange; msg=t.msgsPercent.push; alrt="alert-orange"; }
      else { clr="#3cd4a0"; zn=t.zonesPercent.green; msg=t.msgsPercent.good; alrt="alert-green"; }
      const off = 440 - (440 * eff) / 100;
      
      resultDiv.innerHTML = 
        "<div class='history-card'>" +
          "<div class='chart-container'><svg class='chart-svg' viewBox='0 0 160 160'><circle class='chart-bg' cx='80' cy='80' r='70' /><circle class='chart-fill' cx='80' cy='80' r='70' style='stroke:" + clr + "; stroke-dasharray:440; stroke-dashoffset:" + off + ";' /></svg><div class='chart-text'><span class='chart-percent' style='color:" + clr + "'>" + eff + "%</span><span class='chart-label'>" + t.statsPercent.success + "</span></div></div>" +
          "<div class='status-alert " + alrt + "'>" + t.statsPercent.zone + "<br><b style='font-size: 19px; display:block; margin: 4px 0;'>" + zn + "</b>" + msg + "</div>" +
          "<div class='legend'><div class='legend-item'><div class='legend-dot' style='background:#f06767'></div>" + t.legendPercent[0] + "</div><div class='legend-item'><div class='legend-dot' style='background:#ff9800'></div>" + t.legendPercent[1] + "</div><div class='legend-item'><div class='legend-dot' style='background:#3cd4a0'></div>" + t.legendPercent[2] + "</div></div>" +
          "<button class='btn btn-save-res' onclick='openSaveModal(false, -1)'>" + t.btns.saveRes + "</button>" +
        "</div>";
    }

    function openModal(modalId) { document.getElementById(modalId).style.display = 'flex'; }
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    function toggleAccordion(el) { let c = el.nextElementSibling; c.style.display = (c.style.display === 'none' ? 'block' : 'none'); }

    // Запускаем как только страница прогрузится
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('percentInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); addPercent(); }
      });
      setLang('Pyc');
      initAppData();
    });
  </script>
</body>
</html>
