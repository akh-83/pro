<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Norm Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-dark: #1a1d29; --bg-card: #222635; --text-main: #ffffff;
            --text-muted: #7b839c; --accent-blue: #5b7ded; --accent-green: #00e676; --badge-bg: #2a2e40;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        
        .system-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; text-align: center; position: fixed; top: 0; left: 0; z-index: 9999;
            background-color: var(--bg-dark);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--badge-bg); border-top: 4px solid var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #main-app { display: none; padding-bottom: 80px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
        .username { font-size: 18px; font-weight: 700; margin: 0;}
        .users-badge { background-color: var(--badge-bg); padding: 6px 12px; border-radius: 20px; font-size: 12px; }
        .tab-content { display: none; padding: 0 20px; }
        .tab-content.active { display: block; }
        .page-title { text-align: center; font-size: 20px; margin-bottom: 20px; }
        .placeholder-card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; text-align: center; color: var(--text-muted); border: 1px dashed var(--text-muted); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-card); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { color: var(--text-muted); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 50px; height: 50px; transition: color 0.3s; }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; transition: transform 0.2s, fill 0.3s; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item.active svg { transform: scale(1.1); }
        .nav-item.btn-plus { color: var(--accent-green); }
        .nav-item.btn-plus svg { width: 36px; height: 36px; }
        .nav-item.btn-plus.active svg { transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.4)); }
    </style>
</head>
<body>

    <div id="system-screen" class="system-screen">
        <div id="loader" class="spinner"></div>
        <h2 id="system-title">Загрузка...</h2>
        <p id="system-msg">Устанавливаем соединение с таблицей</p>
    </div>

    <div id="main-app">
        <header class="top-bar">
            <h1 class="username" id="ui-username">Username</h1>
            <div class="users-badge"><span data-i18n="users_label" style="opacity: 0.7; margin-right: 5px;">Users:</span><span id="ui-users-count">...</span></div>
        </header>

        <main>
            <section id="tab-home" class="tab-content active"><h2 class="page-title" data-i18n="home_title">Главная</h2><div class="placeholder-card" data-i18n="home_placeholder">Статистика</div></section>
            <section id="tab-history" class="tab-content"><h2 class="page-title" data-i18n="history_title">История</h2><div class="placeholder-card" data-i18n="history_placeholder">История</div></section>
            <section id="tab-calculator" class="tab-content"><h2 class="page-title" data-i18n="calc_title">Калькулятор</h2><div class="placeholder-card" data-i18n="calc_placeholder">Ввод данных</div></section>
            <section id="tab-search" class="tab-content"><h2 class="page-title" data-i18n="search_title">Поиск</h2><div class="placeholder-card" data-i18n="search_placeholder">Поиск</div></section>
            <section id="tab-help" class="tab-content"><h2 class="page-title" data-i18n="help_title">Помощь</h2><div class="placeholder-card" data-i18n="help_placeholder">Инструкция</div></section>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('tab-home', this)"><svg viewBox="0 0 24 24"><path d="M12 3L4 9V21H9V14H15V21H20V9L12 3Z"/></svg></div>
            <div class="nav-item" onclick="switchTab('tab-history', this)"><svg viewBox="0 0 24 24"><path d="M3 13H15V11H3V13ZM3 17H15V15H3V17ZM3 9H15V7H3V9ZM17 13H21V11H17V13ZM17 17H21V15H17V17ZM17 7V9H21V7H17Z"/></svg></div>
            <div class="nav-item btn-plus" onclick="switchTab('tab-calculator', this)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM17 13H13V17H11V13H7V11H11V7H13V11H17V13Z"/></svg></div>
            <div class="nav-item" onclick="switchTab('tab-search', this)"><svg viewBox="0 0 24 24"><path d="M15.5 14H14.71L14.43 13.73C15.41 12.59 16 11.11 16 9.5C16 5.91 13.09 3 9.5 3C5.91 3 3 5.91 3 9.5C3 13.09 5.91 16 9.5 16C11.11 16 12.59 15.41 13.73 14.43L14 14.71V15.5L19 20.49L20.49 19L15.5 14ZM9.5 14C7.01 14 5 11.99 5 9.5C5 7.01 7.01 5 9.5 5C11.99 5 14 7.01 14 9.5C14 11.99 11.99 14 9.5 14Z"/></svg></div>
            <div class="nav-item" onclick="switchTab('tab-help', this)"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V11H13V17ZM13 9H11V7H13V9Z"/></svg></div>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Твоя проверенная рабочая ссылка
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzfRVQoaiq3nGk6GehUU2AhzXsCt7NUQLzYNloLmfNWq46eB5GImEymDFvbKBRBQq80/exec"; 

        const locales = {
            ru: { users_label: "Users:", home_title: "Главная", home_placeholder: "Статистика", history_title: "История нормы", history_placeholder: "Выгрузка XML", calc_title: "Калькулятор", calc_placeholder: "Ввод времени", search_title: "Поиск", search_placeholder: "Поиск", help_title: "Помощь", help_placeholder: "Инструкция" },
            en: { users_label: "Users:", home_title: "Home", home_placeholder: "Stats", history_title: "History", history_placeholder: "XML Export", calc_title: "Calculator", calc_placeholder: "Time Input", search_title: "Search", search_placeholder: "Search", help_title: "Help", help_placeholder: "Guide" }
        };

        function showError(title, msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('system-title').innerText = title;
            document.getElementById('system-msg').innerText = msg;
            document.getElementById('system-title').style.color = "#ff4f4f";
        }

        async function init() {
            const user = tg.initDataUnsafe?.user;
            const userLang = user?.language_code || 'ru';
            const userId = user?.id || "0"; 

            const dict = locales[locales[userLang] ? userLang : 'en'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                if (dict[el.getAttribute('data-i18n')]) el.innerText = dict[el.getAttribute('data-i18n')];
            });
            document.getElementById('ui-username').innerText = user?.first_name || "User";

            // Увеличили таймаут до 10 секунд на всякий случай
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            try {
                const response = await fetch(`${GAS_URL}?action=get_status&userId=${userId}`, { signal: controller.signal });
                const data = await response.json();
                clearTimeout(timeoutId);

                if (data.active) {
                    document.getElementById('system-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('ui-users-count').innerText = data.usersCount;
                } else {
                    showError("Техработы", data.message);
                }
            } catch (err) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('system-title').innerText = "Детали ошибки:";
                document.getElementById('system-msg').innerText = err.name + ": " + err.message;
                document.getElementById('system-title').style.color = "#ff4f4f";
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        init();
    </script>
</body>
</html>f
