<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Калькулятор Валют</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #000; display: flex; justify-content: center; height: 100vh; color: #fff; }
    .app { width: 100%; max-width: 400px; background: #222; display: flex; flex-direction: column; height: 100%; }
    
    /* Рекламный блок */
    .ad-block {
        background: #333;
        color: #888;
        text-align: center;
        padding: 15px;
        margin: 10px 15px 0 15px;
        border-radius: 10px;
        font-size: 14px;
        border: 1px dashed #555;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60px;
    }

    .displays { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 15px 30px; gap: 20px; }
    .row { display: flex; justify-content: space-between; align-items: center; }
    
    .selector { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .selector select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .flag { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; margin-bottom: 5px; background-color: #444; }
    .currency-code { font-size: 18px; font-weight: bold; }
    
    .values { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    .val { font-size: 32px; word-break: break-all; }
    .val2 { color: #aaa; font-size: 24px; }
    .rate { font-size: 12px; color: #888; margin-top: 5px; }

    .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; background: #111; border-top-left-radius: 20px; border-top-right-radius: 20px; }
    
    .btn {
        background: #333;
        color: #fff;
        border: none;
        border-radius: 50px;
        font-size: 24px;
        height: 70px;
        cursor: pointer;
        transition: background 0.2s;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .btn:active { background: #555; }
    
    /* Новые цвета кнопок */
    .btn.action { background: #a5a5a5; color: #000; }
    .btn.action:active { background: #8e8e8e; }
    .btn.operator { background: #ff9f0a; color: #fff; }
    .btn.operator:active { background: #cc7f08; }
    .btn.zero { grid-column: span 2; border-radius: 35px; justify-content: flex-start; padding-left: 30px; }
</style>
</head>
<body>

<div class="app">
    <div class="ad-block">
        Рекламный блок
    </div>

    <div class="displays">
        <div class="row">
            <div class="selector">
                <div class="flag" id="flag1" style="background-image: url('https://flagcdn.com/w80/eu.png');"></div>
                <div class="currency-code" id="code1">EUR</div>
                <select id="sel1" onchange="changeCurrency(1)"></select>
            </div>
            <div class="values">
                <div class="val" id="val1">0</div>
            </div>
        </div>
        <div class="row">
            <div class="selector">
                <div class="flag" id="flag2" style="background-image: url('https://flagcdn.com/w80/us.png');"></div>
                <div class="currency-code" id="code2">USD</div>
                <select id="sel2" onchange="changeCurrency(2)"></select>
            </div>
            <div class="values">
                <div class="val val2" id="val2">0</div>
                <div class="rate" id="ratetext">Загрузка курсов...</div>
            </div>
        </div>
    </div>

    <div class="keypad">
        <button class="btn action" onclick="press('C')">C</button>
        <button class="btn action" onclick="press('BACK')">⌫</button>
        <button class="btn action" onclick="press('%')">%</button>
        <button class="btn operator" onclick="press('/')">÷</button>
        
        <button class="btn" onclick="press('7')">7</button>
        <button class="btn" onclick="press('8')">8</button>
        <button class="btn" onclick="press('9')">9</button>
        <button class="btn operator" onclick="press('*')">×</button>
        
        <button class="btn" onclick="press('4')">4</button>
        <button class="btn" onclick="press('5')">5</button>
        <button class="btn" onclick="press('6')">6</button>
        <button class="btn operator" onclick="press('-')">−</button>
        
        <button class="btn" onclick="press('1')">1</button>
        <button class="btn" onclick="press('2')">2</button>
        <button class="btn" onclick="press('3')">3</button>
        <button class="btn operator" onclick="press('+')">+</button>
        
        <button class="btn zero" onclick="press('0')">0</button>
        <button class="btn" onclick="press('.')">,</button>
        <button class="btn operator" onclick="calc()">=</button>
    </div>
</div>

<script>
    // Маппинг валют на ISO 3166-1 alpha-2 коды для флагов
    const flagMap = {
        'EUR':'eu','GBP':'gb','CHF':'ch','PLN':'pl','CZK':'cz','HUF':'hu','RON':'ro','BGN':'bg','RSD':'rs','BAM':'ba','ALL':'al','MKD':'mk','ISK':'is','DKK':'dk','NOK':'no','SEK':'se','UAH':'ua','GEL':'ge','AMD':'am','AZN':'az','BYN':'by','RUB':'ru','MDL':'md','TRY':'tr','GIP':'gi',
        'USD':'us','CAD':'ca','MXN':'mx','GTQ':'gt','BZD':'bz','HNL':'hn','CRC':'cr','NIO':'ni','PAB':'pa','BSD':'bs','CUP':'cu','DOP':'do','HTG':'ht','JMD':'jm','XCD':'ag','BBD':'bb','TTD':'tt','ARS':'ar','BOB':'bo','BRL':'br','CLP':'cl','COP':'co','GYD':'gy','PYG':'py','PEN':'pe','SRD':'sr','UYU':'uy','VES':'ve','AWG':'aw','ANG':'cw',
        'AUD':'au','NZD':'nz','FJD':'fj','PGK':'pg','SBD':'sb','VUV':'vu','WST':'ws','TOP':'to','CNY':'cn','JPY':'jp','KRW':'kr','MNT':'mn','TWD':'tw','HKD':'hk','MOP':'mo','INR':'in','PKR':'pk','BDT':'bd','LKR':'lk','NPR':'np','MVR':'mv','AFN':'af','KZT':'kz','UZS':'uz','TJS':'tj','KGS':'kg','TMT':'tm','THB':'th','VND':'vn','IDR':'id','MYR':'my','PHP':'ph','SGD':'sg','BND':'bn','KHR':'kh',
        'ILS':'il','JOD':'jo','LBP':'lb','IQD':'iq','KWD':'kw','BHD':'bh','QAR':'qa','AED':'ae','OMR':'om','YER':'ye','SAR':'sa','IRR':'ir','EGP':'eg','LYD':'ly','TND':'tn','DZD':'dz','MAD':'ma','MRU':'mr','XOF':'sn','XAF':'cm','NGN':'ng','GHS':'gh','KES':'ke','TZS':'tz','UGX':'ug','RWF':'rw','BIF':'bi','CDF':'cd','AOA':'ao','ZAR':'za','NAD':'na','BWP':'bw','SZL':'sz','LSL':'ls','ZMW':'zm','MZN':'mz','MGA':'mg','MUR':'mu','SCR':'sc','ETB':'et'
    };

    let rates = {};
    // Установка валют по умолчанию
    let c1 = 'EUR', c2 = 'USD';
    let expression = "0";

    function initSelects() {
        const s1 = document.getElementById('sel1');
        const s2 = document.getElementById('sel2');
        let optionsHtml = '';
        for (let curr in flagMap) {
            optionsHtml += `<option value="${curr}">${curr}</option>`;
        }
        s1.innerHTML = optionsHtml;
        s2.innerHTML = optionsHtml;
        s1.value = c1;
        s2.value = c2;
    }

    function changeCurrency(num) {
        if(num === 1) {
            c1 = document.getElementById('sel1').value;
            document.getElementById('code1').innerText = c1;
            document.getElementById('flag1').style.backgroundImage = `url('https://flagcdn.com/w80/${flagMap[c1]}.png')`;
        } else {
            c2 = document.getElementById('sel2').value;
            document.getElementById('code2').innerText = c2;
            document.getElementById('flag2').style.backgroundImage = `url('https://flagcdn.com/w80/${flagMap[c2]}.png')`;
        }
        updateDisplay();
    }

    function formatNumber(num) {
        return Number(num).toLocaleString('ru-RU', {maximumFractionDigits: 4}).replace(',', '.');
    }

    function press(key) {
        if(key === 'C') expression = "0";
        else if(key === 'BACK') expression = expression.length > 1 ? expression.slice(0, -1) : "0";
        else if(key === '%') {
            try { expression = String(eval(expression) / 100); } catch(e){}
        }
        else {
            if(expression === "0" && key !== '.') expression = key;
            else expression += key;
        }
        document.getElementById('val1').innerText = expression.replace(/([+\\-*/])/g, ' $1 ').replace(/\*/g, '×').replace(/\//g, '÷');
        updateDisplay(false);
    }

    function calc() {
        try {
            expression = String(eval(expression));
            updateDisplay(true);
        } catch(e) {
            expression = "0";
            updateDisplay(true);
        }
    }

    function updateDisplay(formatTop = true) {
        if(formatTop && !isNaN(expression) && expression !== "") {
            document.getElementById('val1').innerText = formatNumber(expression).replace(/\./g, ',');
        }
        
        // Пример симуляции расчета (тут должна быть твоя логика API, 
        // пока подставлен мок для демонстрации работы UI)
        let rate = rates[`${c1}_${c2}`] || (Math.random() * 2).toFixed(4); 
        
        let baseVal = 0;
        try { baseVal = eval(expression) || 0; } catch(e) { baseVal = 0; }
        
        let res = baseVal * rate;
        document.getElementById('val2').innerText = formatNumber(res).replace(/\./g, ',');
        document.getElementById('ratetext').innerText = `1 ${c1} = ${rate} ${c2}`;
    }

    initSelects();
    // Инициализация при старте
    updateDisplay(true);
</script>
</body>
</html>
