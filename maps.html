<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Определение геолокации</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-sA+e2kGk0vM0v1wQ2kqk2kqk2kqk2kqk2kqk2kqk2kQ=" crossorigin=""/>

<style>
  :root{
    --bg:#0b0f14;
    --card:#0f1720;
    --muted:#9aa4b2;
    --accent:#6ee7b7;
    --danger:#ff6b6b;
    --glass: rgba(255,255,255,0.03);
    --radius:14px;
    --shadow: 0 6px 18px rgba(2,6,23,0.6);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:linear-gradient(180deg,#071018 0%, #0b0f14 100%);
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .wrap{
    width:100%;
    max-width:980px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:18px;
    padding:20px;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,0.03);
  }

  header{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:14px;
  }
  .logo{
    width:56px;
    height:56px;
    border-radius:12px;
    background:linear-gradient(135deg,#0ea5a4,#6ee7b7);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    color:#042027;
    font-size:20px;
    flex:0 0 56px;
  }
  h1{
    margin:0;
    font-size:18px;
    letter-spacing:-0.2px;
  }
  p.lead{
    margin:6px 0 0 0;
    color:var(--muted);
    font-size:13px;
  }

  .controls{
    display:flex;
    gap:12px;
    margin:18px 0;
    flex-wrap:wrap;
  }
  button.primary{
    background:linear-gradient(90deg,#0ea5a4,#6ee7b7);
    color:#042027;
    border:0;
    padding:12px 16px;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(14,165,164,0.12);
  }
  button.ghost{
    background:transparent;
    color:var(--muted);
    border:1px solid rgba(255,255,255,0.04);
    padding:12px 14px;
    border-radius:12px;
    cursor:pointer;
  }
  button:disabled{opacity:0.5; cursor:not-allowed}

  .grid{
    display:grid;
    grid-template-columns: 1fr 360px;
    gap:16px;
  }

  /* Map container */
  #map{
    width:100%;
    height:420px;
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.03);
    background:linear-gradient(180deg,#071018,#08121a);
  }

  /* Info card */
  .info{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;
    padding:14px;
    border:1px solid rgba(255,255,255,0.03);
    display:flex;
    flex-direction:column;
    gap:12px;
    height:420px;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .label{font-size:12px; color:var(--muted)}
  .value{
    background:var(--glass);
    padding:10px 12px;
    border-radius:10px;
    font-weight:600;
    color:#e6eef6;
    font-size:14px;
    word-break:break-word;
  }

  .link-row{
    margin-top:auto;
    display:flex;
    gap:8px;
    align-items:center;
  }
  a.gmap{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
    background:transparent;
  }

  .small{
    font-size:13px;
    color:var(--muted);
  }

  /* Responsive */
  @media (max-width:880px){
    .grid{grid-template-columns:1fr; }
    #map, .info{height:360px}
    .wrap{padding:16px}
  }
  @media (max-width:420px){
    header{gap:10px}
    .logo{width:48px;height:48px;font-size:18px}
    h1{font-size:16px}
    .controls{gap:8px}
    button.primary{padding:10px 12px}
  }

  /* small spinner */
  .spinner{
    width:18px;height:18px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.08);
    border-top-color:var(--accent);
    animation:spin 1s linear infinite;
    display:inline-block;
    vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="wrap" role="main">
    <header>
      <div class="logo">G</div>
      <div>
        <h1>Определение геолокации</h1>
        <p class="lead">Нажмите кнопку, чтобы показать ваше текущее местоположение и получить адрес с картой.</p>
      </div>
    </header>

    <div class="controls">
      <button id="locateBtn" class="primary" aria-live="polite">
        <span id="locateText">Показать моё местоположение</span>
      </button>
      <button id="recenterBtn" class="ghost" disabled>Центрировать карту</button>
      <button id="copyBtn" class="ghost" disabled>Копировать ссылку</button>
      <div style="margin-left:auto" class="small" id="status">Готово</div>
    </div>

    <div class="grid">
      <div id="map" aria-label="Карта местоположения"></div>

      <aside class="info" aria-label="Информация о местоположении">
        <div class="field">
          <div class="label">Страна</div>
          <div id="country" class="value">—</div>
        </div>
        <div class="field">
          <div class="label">Город</div>
          <div id="city" class="value">—</div>
        </div>
        <div class="field">
          <div class="label">Широта</div>
          <div id="lat" class="value">—</div>
        </div>
        <div class="field">
          <div class="label">Долгота</div>
          <div id="lon" class="value">—</div>
        </div>

        <div class="field">
          <div class="label">Ссылка в Google Maps</div>
          <div id="gmapLink" class="value"><a id="gmapAnchor" class="gmap" href="#" target="_blank" rel="noopener noreferrer">—</a></div>
        </div>

        <div class="link-row">
          <div class="small">Источник геокодирования</div>
          <div style="margin-left:auto" class="small">OpenStreetMap Nominatim</div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-o9N1j8k6k2kqk2kqk2kqk2kqk2kqk2kqk2kqk2kqkQ=" crossorigin=""></script>

  <script>
  // Элементы
  const locateBtn = document.getElementById('locateBtn');
  const locateText = document.getElementById('locateText');
  const statusEl = document.getElementById('status');
  const recenterBtn = document.getElementById('recenterBtn');
  const copyBtn = document.getElementById('copyBtn');

  const countryEl = document.getElementById('country');
  const cityEl = document.getElementById('city');
  const latEl = document.getElementById('lat');
  const lonEl = document.getElementById('lon');
  const gmapAnchor = document.getElementById('gmapAnchor');

  // Инициализация карты
  const map = L.map('map', { zoomControl: true, attributionControl: true }).setView([20,0], 2);

  // Тёмная плитка CartoDB Dark Matter
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  let marker = null;
  let currentCoords = null;
  let currentGmapUrl = '';

  function setStatus(text, isError=false){
    statusEl.textContent = text;
    statusEl.style.color = isError ? 'var(--danger)' : 'var(--muted)';
  }

  function showSpinnerOnButton(show){
    if(show){
      locateText.innerHTML = '<span class="spinner" aria-hidden="true"></span> Определяю...';
    } else {
      locateText.textContent = 'Показать моё местоположение';
    }
  }

  // Обработчик кнопки
  locateBtn.addEventListener('click', () => {
    if(!navigator.geolocation){
      setStatus('Геолокация не поддерживается в этом браузере', true);
      return;
    }
    showSpinnerOnButton(true);
    setStatus('Запрос разрешения на геолокацию...');
    navigator.geolocation.getCurrentPosition(successPosition, errorPosition, {
      enableHighAccuracy: true,
      timeout: 20000,
      maximumAge: 0
    });
  });

  recenterBtn.addEventListener('click', () => {
    if(currentCoords){
      map.setView(currentCoords, 15, { animate: true });
      if(marker) marker.openPopup();
    }
  });

  copyBtn.addEventListener('click', async () => {
    if(!currentGmapUrl) return;
    try{
      await navigator.clipboard.writeText(currentGmapUrl);
      setStatus('Ссылка скопирована');
    } catch(e){
      setStatus('Не удалось скопировать ссылку', true);
    }
  });

  // Успех получения координат
  async function successPosition(pos){
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    currentCoords = [lat, lon];

    // Обновляем карту и маркер
    if(marker) map.removeLayer(marker);
    marker = L.marker(currentCoords, { title: 'Вы здесь' }).addTo(map);
    marker.bindPopup('Вы здесь').openPopup();
    map.setView(currentCoords, 15, { animate: true });

    // Обновляем поля
    latEl.textContent = lat.toFixed(6);
    lonEl.textContent = lon.toFixed(6);

    // Формируем ссылку Google Maps
    currentGmapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(lat + ',' + lon)}`;
    gmapAnchor.href = currentGmapUrl;
    gmapAnchor.textContent = 'Открыть в Google Maps';
    copyBtn.disabled = false;
    recenterBtn.disabled = false;

    setStatus('Получаю адрес по координатам...');

    // Reverse geocoding через Nominatim
    try{
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&addressdetails=1&accept-language=ru`;
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if(!resp.ok) throw new Error('Ошибка геокодирования');
      const data = await resp.json();

      const addr = data.address || {};
      const country = addr.country || data.display_name || '—';
      // city может быть в разных полях
      const city = addr.city || addr.town || addr.village || addr.hamlet || addr.county || '—';

      countryEl.textContent = country;
      cityEl.textContent = city;

      setStatus('Готово');
    } catch(err){
      countryEl.textContent = '—';
      cityEl.textContent = '—';
      setStatus('Не удалось получить адрес', true);
    } finally {
      showSpinnerOnButton(false);
    }
  }

  // Ошибка получения координат
  function errorPosition(err){
    showSpinnerOnButton(false);
    switch(err.code){
      case err.PERMISSION_DENIED:
        setStatus('Разрешение на геолокацию отклонено', true);
        break;
      case err.POSITION_UNAVAILABLE:
        setStatus('Информация о местоположении недоступна', true);
        break;
      case err.TIMEOUT:
        setStatus('Превышено время ожидания геолокации', true);
        break;
      default:
        setStatus('Неизвестная ошибка геолокации', true);
    }
  }

  // Подсказка: при загрузке можно попытаться показать приблизительное местоположение по IP (опционально)
  // Но в этом примере мы ждём явного нажатия пользователя для приватности.
  </script>
</body>
</html>
